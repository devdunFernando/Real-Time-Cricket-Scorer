// ═══════════════════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
const isLegal  =(o)=>o!=="Wd"&&o!=="Nb"&&!isWide(o);
const isWide   =(o)=>typeof o==="string"&&(o==="Wd"||o.startsWith("Wd"));
const wideRuns =(o)=>o==="Wd"?1:(o.startsWith("Wd")?1+parseInt(o.slice(2)):0);
const isLegBye =(o)=>typeof o==="string"&&o.startsWith("Lb");
const isBye    =(o)=>typeof o==="string"&&o.startsWith("By");
const lbRuns   =(o)=>isLegBye(o)?parseInt(o.slice(2)):0;
const byeRuns  =(o)=>isBye(o)?parseInt(o.slice(2)):0;
const totalRuns=(o)=>{if(typeof o==="number")return o;if(isWide(o))return wideRuns(o);if(o==="Nb")return 1;if(isLegBye(o))return lbRuns(o);if(isBye(o))return byeRuns(o);return 0;};
const batRuns  =(o)=>(typeof o==="number"?o:0);
const oddRuns  =(o)=>{if(isLegBye(o))return lbRuns(o)%2===1;if(isBye(o))return byeRuns(o)%2===1;return isLegal(o)&&typeof o==="number"&&o%2===1;};
const maxBowlOv=(fmt)=>fmt==="T20"?4:fmt==="ODI"?10:Infinity;
const makeBatter=(name)=>({name,runs:0,balls:0,fours:0,sixes:0,out:false,wicketInfo:""});
const makeBowler=(name)=>({name,overs:0,balls:0,runs:0,wickets:0,maidens:0});
// Session helper: 0-29 overs = morning, 30-59 = afternoon, 60-89 = evening (0-based over index)
const getSessionName=(dayOv)=>dayOv<30?"Morning Session":dayOv<60?"Afternoon Session":"Evening Session";
const getBreakAfterSession=(dayOv)=>dayOv>=30&&dayOv<31?"lunch":dayOv>=60&&dayOv<61?"tea":dayOv>=90?"stumps":null;

function BallChip({outcome,small}){
  const cfg=BALL_OUTCOMES[outcome]??BALL_OUTCOMES[0];
  const sz=small?"w-6 h-6 text-xs":"w-8 h-8 text-sm";
  return <div className={`${sz} rounded-full flex items-center justify-center font-bold border flex-shrink-0`} style={{background:cfg.bg,color:cfg.color,borderColor:cfg.color+"55"}}>{cfg.symbol}</div>;
}

function OverRow({over,num,bowlerName}){
  const runs=over.reduce((a,b)=>a+totalRuns(b),0);
  const wkts=over.filter(b=>b==="W").length;
  return(
    <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
      <span style={{width:"24px",fontSize:"11px",fontFamily:"monospace",color:"#4a7fa5",flexShrink:0}}>{num}</span>
      <div style={{display:"flex",gap:"4px",flex:1,flexWrap:"wrap"}}>{over.map((b,i)=><BallChip key={i} outcome={b} small/>)}</div>
      <div style={{textAlign:"right",flexShrink:0}}>
        <div style={{fontSize:"11px",fontFamily:"monospace"}}><span style={{color:"#fff",fontWeight:700}}>{runs}</span>{wkts>0&&<span style={{color:"#f87171",marginLeft:"4px"}}>{wkts}W</span>}</div>
        {bowlerName&&<div style={{fontSize:"9px",color:"#4a7fa5"}}>{bowlerName}</div>}
      </div>
    </div>
  );
}

function RunChart({overs}){
  if(!overs.length)return null;
  const W=300,H=65,maxR=24;
  const pts=overs.map((ov,i)=>{const r=ov.balls.reduce((a,b)=>a+totalRuns(b),0);return{x:(i+1)/overs.length*W,y:H-(Math.min(r,maxR)/maxR)*H};});
  const line=pts.map((p,i)=>`${i?"L":"M"}${p.x} ${p.y}`).join(" ");
  const area=line+` L${pts.at(-1).x} ${H} L0 ${H}Z`;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:55}}>
      <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#3b82f6" stopOpacity=".4"/><stop offset="100%" stopColor="#3b82f6" stopOpacity=".02"/></linearGradient></defs>
      <path d={area} fill="url(#cg)"/><path d={line} fill="none" stroke="#3b82f6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="2.5" fill="#3b82f6"/>)}
    </svg>
  );
}

// ─── Team Picker ───────────────────────────────────────────────────────────────

  return(
    <div style={{position:"relative"}}>
      <div style={{fontSize:"11px",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:"#4a7fa5",marginBottom:"6px"}}>{label}</div>

        {team?(<><span style={{fontSize:"22px"}}>{team.flag}</span><div style={{flex:1}}><div style={{fontWeight:700,fontSize:"13px",color:"#e0eaf3"}}>{team.name}</div><div style={{fontSize:"10px",color:"#4a7fa5"}}>{selected}</div></div></>):(<div style={{flex:1,fontSize:"13px",color:"#3a5a7a"}}>Tap to select team…</div>)}
        <span style={{color:"#4a7fa5",fontSize:"10px"}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{position:"absolute",zIndex:30,left:0,right:0,marginTop:"4px",borderRadius:"14px",overflow:"hidden",background:"#0d1b2a",border:"1px solid rgba(59,158,255,.25)",boxShadow:"0 8px 32px rgba(0,0,0,.6)"}}>

            {TEAM_CODES.map(code=>{
              const t=ALL_TEAMS[code],isOther=code===other;
              return(

                  style={{width:"100%",padding:"10px 12px",display:"flex",alignItems:"center",gap:"10px",textAlign:"left",borderBottom:"1px solid rgba(255,255,255,.05)",cursor:isOther?"not-allowed":"pointer",opacity:isOther?.3:1,background:selected===code?"rgba(59,158,255,.12)":"transparent"}}>

                  {selected===code&&<span style={{color:"#3b9eff",fontSize:"12px"}}>✓</span>}
                </button>

// ─── Bowler Modal ──────────────────────────────────────────────────────────────
function BowlerModal({teamCode,format,bowlStats,lastBowlerIdx,onSelect}){
  const maxOv=maxBowlOv(format),wkIdx=ALL_TEAMS[teamCode].wkIdx;
  return(
    <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"12px",background:"rgba(0,0,0,.87)",backdropFilter:"blur(6px)"}}>
      <div style={{width:"100%",maxWidth:"400px",borderRadius:"20px",overflow:"hidden",background:"#0d1b2a",border:"1px solid rgba(59,158,255,.3)"}}>
        <div style={{padding:"14px 16px",background:"rgba(59,158,255,.1)",borderBottom:"1px solid rgba(255,255,255,.08)"}}>
          <div style={{fontWeight:800,fontSize:"15px",color:"#3b9eff"}}>🏏 Select Next Bowler</div>
          <div style={{fontSize:"11px",color:"#4a7fa5",marginTop:"2px"}}>{format==="Test"?"No over limit":`Max ${maxOv} overs`} · No consecutive overs · WK excluded</div>
        </div>
        <div style={{overflowY:"auto",maxHeight:"380px"}}>
          {bowlStats.map((p,i)=>{
            const isWK=i===wkIdx,isLast=i===lastBowlerIdx,full=format!=="Test"&&p.overs>=maxOv;
            const disabled=isWK||isLast||full;
            let reason="";if(isWK)reason="Wicket-keeper";else if(isLast)reason="Bowled last over";else if(full)reason=`Quota full (${maxOv}ov)`;
            const eco=p.overs>0||p.balls>0?(p.runs/Math.max((p.overs*6+p.balls)/6,.1)).toFixed(1):null;
            const ini=p.name.replace(/\s*\(wk\)/,"").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
            return(
              <button key={i} onClick={()=>!disabled&&onSelect(i)} disabled={disabled}
                style={{width:"100%",padding:"12px 14px",display:"flex",alignItems:"center",gap:"10px",textAlign:"left",borderBottom:"1px solid rgba(255,255,255,.05)",cursor:disabled?"not-allowed":"pointer",opacity:disabled?.35:1,background:"transparent"}}>
                <div style={{width:"34px",height:"34px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:800,flexShrink:0,background:disabled?"rgba(255,255,255,.05)":p.overs>0||p.balls>0?"rgba(59,158,255,.18)":"rgba(255,255,255,.08)",color:disabled?"#444":p.overs>0||p.balls>0?"#3b9eff":"#888",border:`1px solid ${disabled?"rgba(255,255,255,.05)":p.overs>0||p.balls>0?"rgba(59,158,255,.3)":"rgba(255,255,255,.1)"}`}}>{ini}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"13px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:disabled?"#555":"#dce8f0"}}>{p.name}</div>
                  {reason?<div style={{fontSize:"11px",color:"#ff6666"}}>{reason}</div>:<div style={{fontSize:"11px",color:"#4a7fa5"}}>{eco?`${p.overs}.${p.balls%6}ov · ${p.runs}R · ${p.wickets}W · Eco ${eco}`:"Yet to bowl"}</div>}
                </div>
                {format!=="Test"&&(<div style={{display:"flex",gap:"2px",flexShrink:0}}>{Array.from({length:Math.min(maxOv,10)}).map((_,j)=><div key={j} style={{width:"5px",height:"12px",borderRadius:"2px",background:j<p.overs?"#3b9eff":"rgba(255,255,255,.1)"}}/>)}{maxOv>10&&<span style={{fontSize:"10px",color:"#4a7fa5",marginLeft:"4px"}}>{p.overs}/{maxOv}</span>}</div>)}
                {format==="Test"&&<div style={{fontSize:"10px",fontFamily:"monospace",color:"#4a7fa5",flexShrink:0}}>{p.overs}ov</div>}
              </button>
            );
          })}
        </div>
        <div style={{padding:"10px",borderTop:"1px solid rgba(255,255,255,.07)",textAlign:"center",fontSize:"11px",color:"#2a4a6a"}}>WK and previous over's bowler are ineligible</div>
      </div>
    </div>
  );
}

  // ── Setup / Toss ──
  const [screen,         setScreen]         = useState("teams");
  const [format,         setFormat]         = useState("T20");
  const [teamA,          setTeamA]          = useState(null);
  const [teamB,          setTeamB]          = useState(null);
  const [tossStep,       setTossStep]       = useState("pick_caller");
  const [tossCallerSlot, setTossCallerSlot] = useState(null);
  const [tossSide,       setTossSide]       = useState(null);
  const [tossResult,     setTossResult]     = useState(null);
  const [tossWon,        setTossWon]        = useState(null);
  const [tossChoice,     setTossChoice]     = useState(null);

  // ── Match ──
  // For Test: innings 1–4 (1&3 = teamA bats, 2&4 = teamB bats by default,
  //           but swapped if B won toss & chose bat)
  // innIdx = 0-based index into scores[] / allOvers[] / batStats[] / bowlStats[]
  const [innIdx,         setInnIdx]         = useState(0);
  const [batTeamCode,    setBatTeamCode]    = useState(null); // who is batting NOW
  const [target,         setTarget]         = useState(null); // only relevant in limited overs 2nd inn / Test 4th inn
  const [matchResult,    setMatchResult]    = useState(null);

  // scores[0..3] — up to 4 innings for Test
  const [scores,   setScores]   = useState([{runs:0,wickets:0,overs:0,balls:0},{runs:0,wickets:0,overs:0,balls:0},{runs:0,wickets:0,overs:0,balls:0},{runs:0,wickets:0,overs:0,balls:0}]);
  const [curOver,  setCurOver]  = useState([]);
  const [allOvers, setAllOvers] = useState([[],[],[],[]]);

  // batTeamOrder[i] = which team code bats in innings i (0-based)
  const [batOrder, setBatOrder] = useState(["","","",""]);

  // Strike model
  const [onField,     setOnField]     = useState([0,1]);
  const [strikerSlot, setStrikerSlot] = useState(0);
  const nextBatRef = useRef(2);

  // Bowler
  const [bowlerIdx,       setBowlerIdx]       = useState(null);
  const [lastBowlerIdx,   setLastBowlerIdx]   = useState(null);
  const [showBowlerModal, setShowBowlerModal] = useState(false);

  // batStats/bowlStats — indexed by [team][inn]: { [teamCode]: { [innIdx]: stats[] } }
  const [batStats,  setBatStats]  = useState({});
  const [bowlStats, setBowlStats] = useState({});

  const [commentary,  setCommentary]  = useState([]);
  const [recentBalls, setRecentBalls] = useState([]);
  const [flashScore,  setFlashScore]  = useState(false);
  const [tab,         setTab]         = useState("score");
  const [wicketModal, setWicketModal] = useState(false);
  const [showEndModal,setShowEndModal]= useState(false);
  const [showFollowOnModal, setShowFollowOnModal] = useState(false);
  const [showDeclareModal,  setShowDeclareModal]  = useState(false);
  const [showHomeConfirm,   setShowHomeConfirm]   = useState(false);

  // ── Super Over (T20 tie) ──
  const [superOverNum,      setSuperOverNum]      = useState(0);   // 0 = not in super over, 1+ = super over number
  const [superOverPhase,    setSuperOverPhase]    = useState(0);   // 0=first bat, 1=second bat
  const [superOverScores,   setSuperOverScores]   = useState([]);  // [{team, runs, wickets}]
  const [showSuperOverModal,setShowSuperOverModal]= useState(false);

  // ── Test Match Day/Session tracking ──
  const [testDay,          setTestDay]          = useState(1);   // 1–5
  const [dayOvers,         setDayOvers]         = useState(0);   // overs bowled today (resets each day)
  const [sessionBreak,     setSessionBreak]     = useState(null); // null | {type:'lunch'|'tea'|'stumps', day, snapshots}
  const [sessionSnapshots, setSessionSnapshots] = useState([]);   // array of end-of-session snapshots for pie chart

  // ── Derived ──
  const maxOv = format==="T20"?20:format==="ODI"?50:999;
  const sc     = scores[innIdx];
  const bowlTeamCode = batTeamCode?(batTeamCode===teamA?teamB:teamA):null;
  const striker = onField[strikerSlot];

  // How many innings total: T20/ODI = 2, Test = 4
  const totalInnings = format==="Test"?4:2;

  const effMaxOv = superOverNum>0?1:maxOv;
  const crr=()=>{const b=sc.overs*6+sc.balls;return b===0?"0.00":((sc.runs/b)*6).toFixed(2);};
  const rrr=()=>{
    if(!target)return null;
    const bl=effMaxOv*6-(sc.overs*6+sc.balls),need=target-sc.runs;
    return(bl<=0||need<=0)?null:((need/bl)*6).toFixed(2);
  };
  // Balls remaining in innings (limited overs only)
  const ballsRemaining=()=>{
    if(format==="Test"&&superOverNum===0)return null;
    return effMaxOv*6-(sc.overs*6+sc.balls);
  };
  const runsNeeded=()=>target?Math.max(0,target-sc.runs):null;

  const addComm=(text,type="normal")=>{
    setCommentary(prev=>[{id:Date.now()+Math.random(),over:`${sc.overs}.${sc.balls}`,text,type},...prev.slice(0,79)]);
  };

  // ── Reset in-innings state ──
  const resetInningState=()=>{
    setCurOver([]);setOnField([0,1]);setStrikerSlot(0);
    setBowlerIdx(null);setLastBowlerIdx(null);
    nextBatRef.current=2;
  };

  // ── Init match ──
  const initMatch=(firstBatCode)=>{
    const a=teamA,b=teamB;
    // Build batOrder: for limited overs [firstBat, other]; for Test [firstBat, other, firstBat, other]
    const other=firstBatCode===a?b:a;
    const order=format==="Test"?[firstBatCode,other,firstBatCode,other]:[firstBatCode,other];
    setBatOrder(order);
    // Init stats for all 4 innings slots (even if unused for limited overs)
    const initBat={};const initBowl={};
    [a,b].forEach(tc=>{initBat[tc]={};initBowl[tc]={};[0,1,2,3].forEach(i=>{initBat[tc][i]=ALL_TEAMS[tc].players.map(makeBatter);initBowl[tc][i]=ALL_TEAMS[tc].players.map(makeBowler);});});
    setBatStats(initBat);setBowlStats(initBowl);
    setBatTeamCode(firstBatCode);
    setInnIdx(0);
    setScores([{runs:0,wickets:0,overs:0,balls:0},{runs:0,wickets:0,overs:0,balls:0},{runs:0,wickets:0,overs:0,balls:0},{runs:0,wickets:0,overs:0,balls:0}]);
    setAllOvers([[],[],[],[]]);
    resetInningState();
    setTarget(null);setMatchResult(null);setRecentBalls([]);setCommentary([]);setTab("score");
    setScreen("playing");setShowBowlerModal(true);
    setTimeout(()=>{},50);
  };

  const triggerBowlerChange=(prevIdx)=>{setLastBowlerIdx(prevIdx);setBowlerIdx(null);setShowBowlerModal(true);};

  // ── Follow-on threshold (Test only: 200 runs for 5-day) ──
  const FOLLOW_ON_LEAD = 200;

  // ── Can follow-on be offered? ──
  // Only after innings 1 (idx=0) is done AND innings 2 (idx=1) just ended with deficit >= 200
  // The team that batted FIRST (batOrder[0]) is the one who can enforce it
  const canEnforceFollowOn=(newScores)=>{
    if(format!=="Test") return false;
    const firstBatRuns = newScores[0].runs;
    const secondBatRuns = newScores[1].runs;
    const deficit = firstBatRuns - secondBatRuns;
    // Follow-on can only be offered right after innIdx===1 ends
    return innIdx===1 && deficit >= FOLLOW_ON_LEAD;
  };

  // ── Compute target for 4th innings ──
  const computeTestTarget=(newScores, newBatOrder)=>{
    // Batting team in 4th innings needs: opponent total across their innings + 1
    // newBatOrder[3] is who bats 4th
    const team4=newBatOrder[3], team3=newBatOrder[2];
    // team batting 3rd & 4th share same side; opponent batted 1st & 2nd (or 1st & 3rd in follow-on)
    // Sum runs for "defending" team (who is NOT batting in inn 4)
    const defendingTeam = team4===newBatOrder[0] ? newBatOrder[1] : newBatOrder[0];
    // Find innings indexes where defending team batted
    const defInnRuns = newBatOrder.slice(0,3).reduce((sum,tc,i)=>tc===defendingTeam?sum+newScores[i].runs:sum, 0);
    // batting team runs so far (innings 0..2 where they batted)
    const batInnRuns = newBatOrder.slice(0,3).reduce((sum,tc,i)=>tc===team4?sum+newScores[i].runs:sum, 0);
    return defInnRuns - batInnRuns + 1;
  };

  // ── Advance to next innings (normal path, no follow-on) ──
  const advanceInnings=(newScores,currentInnIdx,currentBatCode,forcedBatCode=null)=>{
    const nextInn=currentInnIdx+1;
    const currentBowlCode=currentBatCode===teamA?teamB:teamA;

    if(format!=="Test"){
      if(nextInn===1){
        const tgt=newScores[0].runs+1;
        setTarget(tgt);
        setInnIdx(1);
        setBatTeamCode(currentBowlCode);
        resetInningState();
        setShowBowlerModal(true);
        addComm(`1st innings over! ${ALL_TEAMS[currentBowlCode].name} need ${tgt} runs to win.`,"milestone");
        return true;
      }
      return false;
    } else {
      if(nextInn>=totalInnings){return false;}
      // forcedBatCode is used when follow-on is enforced (same team bats again)
      const nextBatCode = forcedBatCode || (nextInn%2===0?batOrder[0]:batOrder[1]);

      // Update batOrder if follow-on was enforced (inn2 & inn3 same team bats)
      let newBatOrder = [...batOrder];
      if(forcedBatCode){
        // inn index 2 = same as inn 1 team; inn index 3 = batOrder[0] (first batting team)
        newBatOrder[2] = forcedBatCode;
        newBatOrder[3] = forcedBatCode===teamA?teamB:teamA;
        setBatOrder(newBatOrder);
      }

      let tgt=null;
      if(nextInn===3){
        tgt = computeTestTarget(newScores, newBatOrder);
        setTarget(tgt);
        const chaser = ALL_TEAMS[nextBatCode].name;
        addComm(`4th innings! ${chaser} need ${tgt} to win.`,"milestone");
      } else {
        addComm(`Innings ${nextInn+1} begins! ${ALL_TEAMS[nextBatCode].name} batting.`,"milestone");
      }

      setInnIdx(nextInn);
      setBatTeamCode(nextBatCode);
      resetInningState();
      setShowBowlerModal(true);
      return true;
    }
  };

  // ── Follow-on enforced by fielding captain ──
  const enforceFollowOn=()=>{
    // The team that just batted (innIdx=1) bats again (innIdx=2)
    const followOnTeam = batOrder[1]; // who just batted and trails
    const newBatOrder = [batOrder[0], batOrder[1], batOrder[1], batOrder[0]];
    setBatOrder(newBatOrder);
    setInnIdx(2);
    setBatTeamCode(followOnTeam);
    resetInningState();
    setShowBowlerModal(true);
    setShowFollowOnModal(false);
    addComm(`⚡ FOLLOW-ON ENFORCED! ${ALL_TEAMS[followOnTeam].name} must bat again!`,"milestone");
  };

  // ── Declare innings (Test only, batting captain closes innings) ──
  const declareInnings=()=>{
    if(format!=="Test"||matchResult) return;
    // Can declare in 1st or 2nd innings (innIdx 0,1,2 — not the final 4th innings)
    if(innIdx>=3) return;
    setShowDeclareModal(false);
    const declaringTeam = ALL_TEAMS[batTeamCode].name;
    const declaredScore = `${sc.runs}/${sc.wickets} (${sc.overs}.${sc.balls} ov)`;
    addComm(`🏳️ DECLARATION! ${declaringTeam} declare on ${declaredScore}`,"milestone");

    // Save current state before advancing
    const newScores = scores.map(s=>({...s}));
    // Mark innings as declared (store current score)
    // Check if follow-on applies AFTER inn 1 ends
    const offerFollow = canEnforceFollowOn(newScores);
    if(offerFollow){
      setShowFollowOnModal(true);
      return;
    }
    advanceInnings(newScores, innIdx, batTeamCode);
  };

  // ── Compute Test match result (supports follow-on: batOrder may be [A,B,B,A]) ──
  const computeTestResult=(newScores,endedInnIdx)=>{
    // Use current batOrder (may be modified by follow-on)
    const order = batOrder;
    // Sum runs per team across all innings played
    const teamRuns=(tc)=>order.slice(0,endedInnIdx+1).reduce((sum,t,i)=>t===tc?sum+(newScores[i]?.runs||0):sum,0);
    const aRuns=teamRuns(order[0]);
    const bRuns=teamRuns(order[1]);

    if(endedInnIdx===1) return null; // 2nd innings just ended, may follow-on or continue

    if(endedInnIdx===2){
      // 3rd innings just ended — check if match can be won by an innings
      // This happens when follow-on team is all out and still trails
      // The non-follow-on team leads across all innings played
      if(aRuns>bRuns){
        const diff=aRuns-bRuns;
        // Check if winning team still has innings to spare (innings win)
        const aInningsPlayed=order.slice(0,3).filter(t=>t===order[0]).length;
        if(aInningsPlayed===1){return`${ALL_TEAMS[order[0]].name} won by an innings and ${diff} run${diff!==1?"s":""}!`;}
        return`${ALL_TEAMS[order[0]].name} won by ${diff} run${diff!==1?"s":""}!`;
      }
      if(bRuns>aRuns){
        const diff=bRuns-aRuns;
        const bInningsPlayed=order.slice(0,3).filter(t=>t===order[1]).length;
        if(bInningsPlayed===1){return`${ALL_TEAMS[order[1]].name} won by an innings and ${diff} run${diff!==1?"s":""}!`;}
        return`${ALL_TEAMS[order[1]].name} won by ${diff} run${diff!==1?"s":""}!`;
      }
      return null;
    }
    if(endedInnIdx===3){
      if(aRuns>bRuns){const diff=aRuns-bRuns;return`${ALL_TEAMS[order[0]].name} won by ${diff} run${diff!==1?"s":""}!`;}
      if(bRuns>aRuns){const diff=bRuns-aRuns;return`${ALL_TEAMS[order[1]].name} won by ${diff} run${diff!==1?"s":""}!`;}
      return"Match Drawn!";
    }
    return null;
  };

  // ═══════════════════════════════════════════════════════════════════════════
  //  processBall
  // ═══════════════════════════════════════════════════════════════════════════
  const processBall=(outcome)=>{
    if(matchResult||bowlerIdx===null)return;
    if(outcome==="W"){setWicketModal(true);return;}

    setFlashScore(true);setTimeout(()=>setFlashScore(false),400);

    let newScores=scores.map(s=>({...s}));
    let newBat={...batStats,[batTeamCode]:{...batStats[batTeamCode],[innIdx]:batStats[batTeamCode][innIdx].map(p=>({...p}))}};
    let newBowl={...bowlStats,[bowlTeamCode]:{...bowlStats[bowlTeamCode],[innIdx]:bowlStats[bowlTeamCode][innIdx].map(p=>({...p}))}};

    const legal=isLegal(outcome),runs=totalRuns(outcome);
    newScores[innIdx].runs+=runs;
    // Byes don't count against bowler's runs; leg byes and wides do
    if(!isBye(outcome))newBowl[bowlTeamCode][innIdx][bowlerIdx].runs+=runs;

    if(legal){
      newBat[batTeamCode][innIdx][striker].balls+=1;
      const br=batRuns(outcome);
      newBat[batTeamCode][innIdx][striker].runs+=br;
      if(outcome===4)newBat[batTeamCode][innIdx][striker].fours+=1;
      if(outcome===6)newBat[batTeamCode][innIdx][striker].sixes+=1;
      newBowl[bowlTeamCode][innIdx][bowlerIdx].balls+=1;
    }

    let newSlot=strikerSlot,newBalls=sc.balls,newOvers=sc.overs;
    let newCurOver=[...curOver,outcome];

    if(legal){
      newBalls+=1;
      if(newBalls===6){
        newBalls=0;newOvers+=1;
        if(!oddRuns(outcome))newSlot=1-newSlot;
        const co={balls:[...newCurOver],bowlerIdx};
        setAllOvers(prev=>{const c=prev.map(a=>[...a]);c[innIdx]=[...c[innIdx],co];return c;});
        newBowl[bowlTeamCode][innIdx][bowlerIdx].overs+=1;
        if(newCurOver.every(b=>b===0||isLegBye(b)||isBye(b)))newBowl[bowlTeamCode][innIdx][bowlerIdx].maidens+=1;
        setCurOver([]);newCurOver=[];
      }else{
        if(oddRuns(outcome))newSlot=1-newSlot;
        setCurOver(newCurOver);
      }
    }else{setCurOver(newCurOver);}

    newScores[innIdx].balls=newBalls;newScores[innIdx].overs=newOvers;

    // ── Test session/day break detection (fires when an over completes) ──
    if(format==="Test" && legal && newBalls===0 && newOvers>0){
      const newDayOvers = dayOvers + 1;
      setDayOvers(newDayOvers);
      if(newDayOvers===30||newDayOvers===60||newDayOvers>=90){
        // Build snapshot for this session break
        const snap={
          day: testDay,
          session: getSessionName(newDayOvers-1),
          type: newDayOvers===30?"lunch":newDayOvers===60?"tea":"stumps",
          batTeam: batTeamCode,
          bowlTeam: bowlTeamCode,
          score: {...newScores[innIdx], overs:newOvers, balls:0},
          allScores: newScores.map(s=>({...s})),
          batPlayers: newBat[batTeamCode][innIdx].map(p=>({...p})),
          bowlPlayers: newBowl[bowlTeamCode][innIdx].map(p=>({...p})),
          sessionRunsA: null, sessionRunsB: null,
          innIdx,
          batOrder: [...batOrder],
        };
        setSessionSnapshots(prev=>[...prev, snap]);
        setScores(newScores);setBatStats(newBat);setBowlStats(newBowl);setStrikerSlot(newSlot);
        // ── Day 5 stumps with no result = DRAW ──
        if(newDayOvers>=90 && testDay>=5){
          const res="Match Drawn! Five days of Test cricket — no result.";
          setMatchResult(res);addComm(`🤝 ${res}`,"milestone");
          setSessionBreak(snap);
          setShowEndModal(true);return;
        }
        setSessionBreak(snap);
        return;
      }
    }

    // Commentary
    const bName=batStats[batTeamCode][innIdx][striker].name,bowName=bowlStats[bowlTeamCode][innIdx][bowlerIdx].name;
    const shot=SHOT_TYPES[Math.floor(Math.random()*SHOT_TYPES.length)];
    let ct="",cy="normal";
    if(outcome===0)ct=`${bName} defends. Dot ball.`;
    else if(outcome===1){ct=`${bName} tucks for a single — strike rotates!`;cy="single";}
    else if(outcome===2)ct=`Good running! ${bName} takes two.`;
    else if(outcome===3)ct=`${bName} finds the gap — three runs! Strike changes.`;
    else if(outcome===4){ct=`FOUR! ${bName} plays a magnificent ${shot}!`;cy="four";}
    else if(outcome===6){ct=`SIX! ${bName} launches ${bowName} over the boundary!`;cy="six";}
    else if(isWide(outcome)){const r=wideRuns(outcome);ct=r===1?`Wide by ${bowName}. 1 extra, no ball count.`:`Wide by ${bowName} — ${r} extras (${r-1} runs + wide penalty). No ball count.`;}
    else if(outcome==="Nb")ct=`No Ball from ${bowName}! Free hit next. 1 extra.`;
    else if(isLegBye(outcome)){const r=lbRuns(outcome);ct=`Leg bye! ${r} run${r!==1?"s":""} off the pad. Legal delivery, ${r} extra${r!==1?"s":""}.`;}
    else if(isBye(outcome)){const r=byeRuns(outcome);ct=`Bye! ${r} run${r!==1?"s":""} — missed by keeper. ${r} extra${r!==1?"s":""}, not charged to bowler.`;}
    addComm(ct,cy);
    setRecentBalls(prev=>[...prev.slice(-29),outcome]);

    // Check innings over
    const inningsOver=newScores[innIdx].wickets>=10||(format!=="Test"&&newScores[innIdx].overs>=maxOv)||
      (superOverNum>0&&newScores[innIdx].overs>=1);

    // ── Super Over: check if chaser wins/ties in super over ──
    if(superOverNum>0&&target&&newScores[innIdx].runs>=target){
      const w=10-newScores[innIdx].wickets;
      const prevSO=[...superOverScores,{team:batTeamCode,runs:newScores[innIdx].runs,wickets:newScores[innIdx].wickets}];
      const t1=prevSO.find(s=>s.team===batOrder[0]),t2=prevSO.find(s=>s.team===batOrder[1]);
      const res=`${ALL_TEAMS[batTeamCode].name} won the Super Over ${superOverNum} by ${w} wicket${w!==1?"s":""}!`;
      setMatchResult(res);addComm(`🏆 ${res}`,"milestone");
      setScores(newScores);setBatStats(newBat);setBowlStats(newBowl);setStrikerSlot(newSlot);
      setShowEndModal(true);return;
    }

    // Check target chased (limited overs & test 4th innings) — regular innings
    if(superOverNum===0&&target&&newScores[innIdx].runs>=target){
      const w=10-newScores[innIdx].wickets;
      const res=`${ALL_TEAMS[batTeamCode].name} won by ${w} wicket${w!==1?"s":""}!`;
      setMatchResult(res);addComm(`🏆 Match Over! ${res}`,"milestone");
      setScores(newScores);setBatStats(newBat);setBowlStats(newBowl);setStrikerSlot(newSlot);
      setShowEndModal(true);return;
    }

    if(inningsOver){
      setScores(newScores);setBatStats(newBat);setBowlStats(newBowl);

      // ── Super Over innings end ──
      if(superOverNum>0){
        if(superOverPhase===0){
          // First SO team done — store their score, set target for second SO team
          const tgt=newScores[innIdx].runs+1;
          const firstTeamEntry={team:batTeamCode,runs:newScores[innIdx].runs,wickets:newScores[innIdx].wickets};
          setSuperOverScores(prev=>[...prev,firstTeamEntry]);
          setTarget(tgt);
          setSuperOverPhase(1);
          const nextTeam=batOrder[1]===batTeamCode?batOrder[0]:batOrder[1];
          setBatTeamCode(nextTeam);
          resetInningState();setShowBowlerModal(true);
          addComm(`Super Over ${superOverNum}: ${ALL_TEAMS[nextTeam].name} need ${tgt} to win.`,"milestone");
          setStrikerSlot(0);return;
        } else {
          // Second SO team done — did they tie again?
          // superOverScores.last = first SO team in this SO
          const firstEntry=superOverScores[superOverScores.length-1];
          const soScore1=firstEntry?.runs??0;
          const soScore2=newScores[innIdx].runs;
          if(soScore2<soScore1){
            // First SO team won (chasing team fell short)
            const deficit=soScore1-soScore2;
            const res=`${ALL_TEAMS[firstEntry.team].name} won Super Over ${superOverNum} by ${deficit} run${deficit!==1?"s":""}!`;
            setMatchResult(res);addComm(`🏆 ${res}`,"milestone");setStrikerSlot(newSlot);setShowEndModal(true);return;
          } else {
            // soScore2 === soScore1: tie (soScore2>soScore1 = win, handled before inningsOver block)
            const newSONum=superOverNum+1;
            setSuperOverScores([]);  // reset for new SO
            setSuperOverNum(newSONum);
            setSuperOverPhase(0);
            setScores(scores.map((_,i)=>i===innIdx?{runs:0,wickets:0,overs:0,balls:0}:scores[i]));
            setAllOvers(prev=>{const c=prev.map(a=>[...a]);c[innIdx]=[];return c;});
            // Alternate: second team from previous SO bats first now
            const firstSOTeam=batTeamCode;
            setTarget(null);
            setBatTeamCode(firstSOTeam);
            resetInningState();setShowBowlerModal(true);
            addComm(`⚡ Super Over ${newSONum}! Another tie — ${ALL_TEAMS[firstSOTeam].name} bats first!`,"milestone");
            setStrikerSlot(0);return;
          }
        }
      }

      if(format==="Test"){
        const res=computeTestResult(newScores,innIdx);
        if(res){setMatchResult(res);addComm(`🏆 Match Over! ${res}`,"milestone");setStrikerSlot(newSlot);setShowEndModal(true);return;}
        if(innIdx===1 && canEnforceFollowOn(newScores)){
          setScores(newScores);setBatStats(newBat);setBowlStats(newBowl);setStrikerSlot(newSlot);
          setShowFollowOnModal(true);return;
        }
      }else{
        if(innIdx===0){
          const tgt=newScores[0].runs+1;
          setTarget(tgt);setInnIdx(1);setBatTeamCode(bowlTeamCode);
          resetInningState();setShowBowlerModal(true);
          addComm(`Innings over! ${ALL_TEAMS[bowlTeamCode].name} need ${tgt} to win.`,"milestone");
          setStrikerSlot(0);return;
        } else {
          // 2nd innings done — check tie
          const chase=newScores[1].runs;
          const tgt1=newScores[0].runs;
          if(chase===tgt1){
            // TIE
            if(format==="ODI"){
              const res=`Match Tied! ${ALL_TEAMS[batTeamCode].name} ${chase}/${newScores[1].wickets} tied ${ALL_TEAMS[bowlTeamCode].name} ${tgt1}. No Super Over in ODI.`;
              setMatchResult(res);addComm(`🤝 ${res}`,"milestone");setStrikerSlot(newSlot);setShowEndModal(true);return;
            } else {
              // T20 — Super Over
              const newSONum=superOverNum+1;
              setSuperOverNum(newSONum);
              setSuperOverPhase(0);
              setSuperOverScores([]);
              // Use same innings index but reset score for the over
              // We reuse innIdx=1 slot but reset its score
              setScores(scores.map((_,i)=>i===1?{runs:0,wickets:0,overs:0,balls:0}:scores[i]));
              setAllOvers(prev=>{const c=prev.map(a=>[...a]);c[1]=[];return c;});
              // First SO: losing team in main match bats first (convention: team that fielded first = bowlTeamCode bats first in SO)
              const firstSOTeam=bowlTeamCode;
              setBatTeamCode(firstSOTeam);
              setTarget(null);
              resetInningState();setShowBowlerModal(true);
              addComm(`⚡ SUPER OVER ${newSONum}! ${ALL_TEAMS[firstSOTeam].name} bats first.`,"milestone");
              setStrikerSlot(0);return;
            }
          }
          // 2nd innings done, batting team didn't reach target
          const deficit=target-newScores[1].runs-1;
          const res=`${ALL_TEAMS[bowlTeamCode].name} won by ${deficit} run${deficit!==1?"s":""}!`;
          setMatchResult(res);addComm(`🏆 Match Over! ${res}`,"milestone");setStrikerSlot(newSlot);setShowEndModal(true);return;
        }
      }
      // Test: advance innings
      const moved=advanceInnings(newScores,innIdx,batTeamCode);
      if(!moved){const res=computeTestResult(newScores,innIdx);if(res){setMatchResult(res);setShowEndModal(true);}}
      setStrikerSlot(newSlot);return;
    }

    setScores(newScores);setBatStats(newBat);setBowlStats(newBowl);setStrikerSlot(newSlot);
    if(legal&&newBalls===0&&newOvers>0&&!inningsOver){
      // ── End-of-over chasing message ──
      if(target&&!matchResult){
        const need=target-newScores[innIdx].runs;
        const wktsLeft=10-newScores[innIdx].wickets;
        if(format==="T20"||format==="ODI"){
          const ovsLeft=maxOv-newOvers;
          const ballsLeft=ovsLeft*6;
          if(need>0&&ovsLeft>0)
            addComm(`📊 ${ALL_TEAMS[batTeamCode].name} need ${need} run${need!==1?"s":""} from ${ovsLeft} over${ovsLeft!==1?"s":""} (${ballsLeft} balls) with ${wktsLeft} wicket${wktsLeft!==1?"s":""} in hand.`,"milestone");
        } else if(format==="Test"&&innIdx===3){
          // Test 4th innings — show both perspectives
          if(need>0)
            addComm(`🏏 ${ALL_TEAMS[batTeamCode].name} need ${need} run${need!==1?"s":""} to win — ${ALL_TEAMS[bowlTeamCode].name} need ${wktsLeft} wicket${wktsLeft!==1?"s":""} to win.`,"milestone");
        }
      }
      triggerBowlerChange(bowlerIdx);
    }
  };

  // ═══════════════════════════════════════════════════════════════════════════
  //  processWicket
  // ═══════════════════════════════════════════════════════════════════════════
  const processWicket=(wType)=>{
    setWicketModal(false);
    if(matchResult||bowlerIdx===null)return;
    const batter=batStats[batTeamCode][innIdx][striker],bowName=bowlStats[bowlTeamCode][innIdx][bowlerIdx].name;

    let newScores=scores.map(s=>({...s}));
    let newBat={...batStats,[batTeamCode]:{...batStats[batTeamCode],[innIdx]:batStats[batTeamCode][innIdx].map(p=>({...p}))}};
    let newBowl={...bowlStats,[bowlTeamCode]:{...bowlStats[bowlTeamCode],[innIdx]:bowlStats[bowlTeamCode][innIdx].map(p=>({...p}))}};

    newBat[batTeamCode][innIdx][striker]={...batter,out:true,balls:batter.balls+1,wicketInfo:`${wType} b ${bowName}`};
    if(wType!=="Run Out")newBowl[bowlTeamCode][innIdx][bowlerIdx].wickets+=1;
    newScores[innIdx].wickets+=1;newScores[innIdx].balls+=1;
    newBowl[bowlTeamCode][innIdx][bowlerIdx].balls+=1;

    const newCurArr=[...curOver,"W"];
    let newSlot=strikerSlot,newOnField=[...onField],overEnded=false;

    if(newScores[innIdx].balls===6){
      newScores[innIdx].balls=0;newScores[innIdx].overs+=1;
      newBowl[bowlTeamCode][innIdx][bowlerIdx].overs+=1;
      setAllOvers(prev=>{const c=prev.map(a=>[...a]);c[innIdx]=[...c[innIdx],{balls:newCurArr,bowlerIdx}];return c;});
      setCurOver([]);
      const nxt=nextBatRef.current;if(nxt<11){newOnField[newSlot]=nxt;nextBatRef.current=nxt+1;}
      newSlot=1-newSlot;overEnded=true;
      // Session break check on wicket that ends an over
      if(format==="Test"){
        const newDayOvers2 = dayOvers + 1;
        if(newDayOvers2===30||newDayOvers2===60||newDayOvers2>=90){
          setDayOvers(newDayOvers2);
          const snap={
            day:testDay,session:getSessionName(newDayOvers2-1),
            type:newDayOvers2===30?"lunch":newDayOvers2===60?"tea":"stumps",
            batTeam:batTeamCode,bowlTeam:bowlTeamCode,
            score:{...newScores[innIdx],overs:newScores[innIdx].overs,balls:0},
            allScores:newScores.map(s=>({...s})),
            batPlayers:newBat[batTeamCode][innIdx].map(p=>({...p})),
            bowlPlayers:newBowl[bowlTeamCode][innIdx].map(p=>({...p})),
            innIdx,batOrder:[...batOrder],
          };
          setSessionSnapshots(prev=>[...prev,snap]);
          addComm(`WICKET! ${batter.name} is OUT — ${wType} b ${bowName}!`,"wicket");
          setRecentBalls(prev=>[...prev.slice(-29),"W"]);
          setScores(newScores);setBatStats(newBat);setBowlStats(newBowl);setOnField(newOnField);setStrikerSlot(newSlot);
          setSessionBreak(snap);
          return;
        }
        setDayOvers(prev=>prev+1);
      }
    }else{
      setCurOver(newCurArr);
      const nxt=nextBatRef.current;if(nxt<11){newOnField[newSlot]=nxt;nextBatRef.current=nxt+1;}
    }

    addComm(`WICKET! ${batter.name} is OUT — ${wType} b ${bowName}!`,"wicket");
    setRecentBalls(prev=>[...prev.slice(-29),"W"]);

    const inningsOver=newScores[innIdx].wickets>=10||(format!=="Test"&&newScores[innIdx].overs>=maxOv);

    if(inningsOver){
      setScores(newScores);setBatStats(newBat);setBowlStats(newBowl);setOnField(newOnField);setStrikerSlot(newSlot);

      if(format==="Test"){
        const res=computeTestResult(newScores,innIdx);
        if(res){setMatchResult(res);addComm(`🏆 Match Over! ${res}`,"milestone");setShowEndModal(true);return;}
        if(innIdx===1 && canEnforceFollowOn(newScores)){
          setShowFollowOnModal(true);return;
        }
        const moved=advanceInnings(newScores,innIdx,batTeamCode);
        if(!moved){const r2=computeTestResult(newScores,innIdx);if(r2){setMatchResult(r2);setShowEndModal(true);}}
      }else{
        if(innIdx===0){
          const tgt=newScores[0].runs+1;
          setTarget(tgt);setInnIdx(1);setBatTeamCode(bowlTeamCode);
          resetInningState();setShowBowlerModal(true);
          addComm(`All out! ${ALL_TEAMS[bowlTeamCode].name} need ${tgt} to win.`,"milestone");
        }else{
          const deficit=target-newScores[1].runs-1;
          const res=`${ALL_TEAMS[bowlTeamCode].name} won by ${deficit} run${deficit!==1?"s":""}!`;
          setMatchResult(res);addComm(`🏆 Match Over! ${res}`,"milestone");setShowEndModal(true);
        }
      }
      return;
    }

    setScores(newScores);setBatStats(newBat);setBowlStats(newBowl);setOnField(newOnField);setStrikerSlot(newSlot);
    if(overEnded&&!inningsOver)triggerBowlerChange(bowlerIdx);
  };

  // ── Resume after session break ──
  const resumeSession=()=>{
    const brk = sessionBreak;
    if(!brk) return;
    if(brk.type==="stumps"){
      // Start new day
      setTestDay(d=>d+1);
      setDayOvers(0);
    }
    setSessionBreak(null);
    // Trigger bowler change since it's a new session
    setBowlerIdx(null);
    setLastBowlerIdx(null);
    setShowBowlerModal(true);
  };

  // ── Reset everything to home ──
  const goHome=()=>{
    setScreen("teams");setMatchResult(null);setShowEndModal(false);
    setTossStep("pick_caller");setTossCallerSlot(null);setTossSide(null);setTossResult(null);setTossWon(null);setTossChoice(null);
    setInnIdx(0);setBatTeamCode(null);setTarget(null);setScores([{runs:0,wickets:0,overs:0,balls:0},{runs:0,wickets:0,overs:0,balls:0},{runs:0,wickets:0,overs:0,balls:0},{runs:0,wickets:0,overs:0,balls:0}]);
    setCurOver([]);setAllOvers([[],[],[],[]]);setOnField([0,1]);setStrikerSlot(0);nextBatRef.current=2;
    setBowlerIdx(null);setLastBowlerIdx(null);setShowBowlerModal(false);setCommentary([]);setRecentBalls([]);
    setBatStats({});setBowlStats({});setTab("score");
    setShowFollowOnModal(false);setShowDeclareModal(false);setShowHomeConfirm(false);
    setTestDay(1);setDayOvers(0);setSessionBreak(null);setSessionSnapshots([]);
    setSuperOverNum(0);setSuperOverPhase(0);setSuperOverScores([]);setShowSuperOverModal(false);
  };

  // ══════════════════════════════════════════════════════════════════════════
  //  STYLES
  // ══════════════════════════════════════════════════════════════════════════
  const G=`
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Space+Mono:wght@400;700&display=swap');
    *{box-sizing:border-box;}
    .btn{transition:all .15s;}.btn:hover:not(:disabled){transform:translateY(-2px) scale(1.05);}.btn:active:not(:disabled){transform:scale(.95);}
    .flash{animation:fl .4s;}@keyframes fl{0%,100%{opacity:1}50%{opacity:.4}}
    .si{animation:si .28s cubic-bezier(.22,1,.36,1);}@keyframes si{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
    .pd{animation:pd .2s ease;}@keyframes pd{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes coinFlip{0%{transform:rotateY(0deg) scaleX(1);}25%{transform:rotateY(270deg) scaleX(.2);}50%{transform:rotateY(540deg) scaleX(1);}75%{transform:rotateY(810deg) scaleX(.2);}100%{transform:rotateY(1080deg) scaleX(1);}}
    @keyframes floatUp{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
    @keyframes resPop{0%{transform:scale(.5);opacity:0;}70%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
    @keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .coin-flip{animation:coinFlip 2.2s cubic-bezier(.4,0,.2,1) forwards;}
    .coin-float{animation:floatUp 2s ease-in-out infinite;}
    .res-pop{animation:resPop .5s cubic-bezier(.34,1.56,.64,1) forwards;}
    .gold-text{background:linear-gradient(90deg,#b8860b,#ffd700,#daa520,#ffd700,#b8860b);background-size:200% auto;animation:shimmer 2s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
  `;
  const base={background:"linear-gradient(180deg,#060c17,#0a1525)",fontFamily:"'Outfit','Segoe UI',sans-serif",color:"#e0eaf3",minHeight:"100vh"};

  // ══════════════════════════════════════════════════════════════════════════
  //  SCREEN 1 — TEAM SELECTION
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="teams"){
    const ok=teamA&&teamB&&teamA!==teamB;
    return(
      <div style={{...base,display:"flex",justifyContent:"center",padding:"16px"}}>
        <style>{G}</style>
        <div style={{width:"100%",maxWidth:"420px"}}>
          <div style={{textAlign:"center",marginBottom:"24px",paddingTop:"12px"}}>
            <div style={{fontSize:"48px",marginBottom:"6px"}}>🏏</div>
            <h1 style={{fontSize:"34px",fontWeight:900,color:"#e8f4f8",letterSpacing:"-0.02em",margin:0}}>LIVE<span style={{color:"#3b9eff"}}>SCORE</span></h1>
            <p style={{color:"#4a7fa5",fontSize:"12px",marginTop:"4px"}}>Professional Cricket Scoring System</p>
          </div>
          <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"16px",padding:"18px",marginBottom:"12px"}}>
            <div style={{fontSize:"11px",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:"#4a7fa5",marginBottom:"10px"}}>Match Format</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"14px"}}>
              {["T20","ODI","Test"].map(f=>(
                <button key={f} onClick={()=>setFormat(f)} style={{padding:"10px 0",borderRadius:"12px",fontWeight:700,fontSize:"14px",cursor:"pointer",background:format===f?"#3b9eff":"rgba(255,255,255,.05)",color:format===f?"#fff":"#7ab3d4",border:`1px solid ${format===f?"#3b9eff":"rgba(255,255,255,.08)"}`,transition:"all .2s"}}>{f}</button>
              ))}
            </div>
            <div style={{background:"rgba(59,158,255,.07)",border:"1px solid rgba(59,158,255,.15)",borderRadius:"10px",padding:"8px 12px",fontSize:"11px",color:"#5a8faa"}}>
              {format==="T20"&&"⚡ 20 overs · Max 4 overs/bowler · No consecutive overs"}
              {format==="ODI"&&"🌍 50 overs · Max 10 overs/bowler · No consecutive overs"}
              {format==="Test"&&"🏟 4 innings (2 per team) · No over limit · No consecutive overs · 5-day match"}
            </div>
          </div>
          <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"16px",padding:"18px",marginBottom:"12px"}}>
            <div style={{fontSize:"11px",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:"#4a7fa5",marginBottom:"12px"}}>Select Teams</div>
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              <TeamPicker label="Team 1" selected={teamA} other={teamB} onSelect={setTeamA}/>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}><div style={{flex:1,height:"1px",background:"rgba(255,255,255,.08)"}}/><span style={{fontSize:"11px",fontWeight:700,color:"#4a7fa5",letterSpacing:"0.1em"}}>VS</span><div style={{flex:1,height:"1px",background:"rgba(255,255,255,.08)"}}/></div>
              <TeamPicker label="Team 2" selected={teamB} other={teamA} onSelect={setTeamB}/>
