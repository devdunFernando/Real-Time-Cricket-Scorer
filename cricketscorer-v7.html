          {teamA&&teamB&&(
            <div style={{background:"rgba(59,158,255,.07)",border:"1px solid rgba(59,158,255,.18)",borderRadius:"14px",padding:"12px 16px",marginBottom:"12px",display:"flex",alignItems:"center",justifyContent:"space-between"}} className="pd">
              <div style={{textAlign:"center"}}><div style={{fontSize:"26px"}}>{ALL_TEAMS[teamA].flag}</div><div style={{fontWeight:700,fontSize:"12px",color:"#3b9eff"}}>{teamA}</div></div>
              <div style={{fontSize:"18px",color:"#2a4a6a",fontWeight:900}}>VS</div>
              <div style={{textAlign:"center"}}><div style={{fontSize:"26px"}}>{ALL_TEAMS[teamB].flag}</div><div style={{fontWeight:700,fontSize:"12px",color:"#3b9eff"}}>{teamB}</div></div>
            </div>
          )}
          <button onClick={()=>ok&&setScreen("toss")} disabled={!ok} style={{width:"100%",padding:"15px",borderRadius:"14px",color:"#fff",fontWeight:700,fontSize:"14px",cursor:ok?"pointer":"not-allowed",background:ok?"linear-gradient(135deg,#1a73e8,#0d47a1)":"rgba(255,255,255,.06)",border:"none",boxShadow:ok?"0 4px 20px rgba(27,115,232,.4)":"none",opacity:ok?1:.5,transition:"all .2s"}}>
            {ok?"PROCEED TO TOSS →":"Select both teams to continue"}
          </button>
        </div>
      </div>
    );
  }

  // ══════════════════════════════════════════════════════════════════════════
  //  SCREEN 2 — TOSS (animated coin flip)
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="toss"){
    const tA=ALL_TEAMS[teamA],tB=ALL_TEAMS[teamB];
    const throwCoin=(side)=>{
      setTossSide(side);setTossStep("flipping");
      setTimeout(()=>{
        const landed=Math.random()<.5?"H":"T";
        setTossResult(landed);
        const won=landed===side?tossCallerSlot:(tossCallerSlot==="A"?"B":"A");
        setTossWon(won);setTossStep("result");
      },2200);
    };
    const winnerTeam=tossWon?ALL_TEAMS[tossWon==="A"?teamA:teamB]:null;
    const canStart=tossWon&&tossChoice;
    const batTeam=!canStart?null:tossChoice==="bat"?tossWon:(tossWon==="A"?"B":"A");
    const batCode=batTeam==="A"?teamA:teamB;
    return(
      <div style={{...base,display:"flex",justifyContent:"center",padding:"16px",paddingBottom:"40px"}}>
        <style>{G}</style>
        <div style={{width:"100%",maxWidth:"420px"}}>
          <button onClick={()=>{setScreen("teams");setTossStep("pick_caller");setTossCallerSlot(null);setTossSide(null);setTossResult(null);setTossWon(null);setTossChoice(null);}} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:"10px",padding:"8px 14px",color:"#7ab3d4",fontSize:"12px",cursor:"pointer",marginBottom:"18px"}}>← Back</button>
          <div style={{textAlign:"center",marginBottom:"20px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"14px",marginBottom:"6px"}}>
              <div style={{textAlign:"center"}}><div style={{fontSize:"34px"}}>{tA.flag}</div><div style={{fontWeight:700,fontSize:"12px",color:"#3b9eff"}}>{teamA}</div></div>
              <div style={{fontSize:"12px",fontWeight:900,color:"#2a4a6a",letterSpacing:"0.1em"}}>VS</div>
              <div style={{textAlign:"center"}}><div style={{fontSize:"34px"}}>{tB.flag}</div><div style={{fontWeight:700,fontSize:"12px",color:"#3b9eff"}}>{teamB}</div></div>
            </div>
            <div style={{fontSize:"11px",color:"#4a7fa5",background:"rgba(59,158,255,.08)",padding:"3px 12px",borderRadius:"20px",display:"inline-block"}}>{format} Match · Toss</div>
          </div>

          {/* Step 1: Pick caller */}
          {tossStep==="pick_caller"&&(
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"18px",padding:"20px"}} className="si">
              <div style={{textAlign:"center",marginBottom:"18px"}}>
                <div style={{fontSize:"28px",marginBottom:"4px"}}>🪙</div>
                <div style={{fontWeight:800,fontSize:"15px",color:"#e0eaf3",marginBottom:"2px"}}>Who calls the coin?</div>
                <div style={{fontSize:"11px",color:"#4a7fa5"}}>One team captain will call Heads or Tails</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                {[["A",teamA,tA],["B",teamB,tB]].map(([slot,code,t])=>(
                  <button key={slot} onClick={()=>{setTossCallerSlot(slot);setTossStep("pick_side");}} className="btn"
                    style={{padding:"16px 10px",borderRadius:"14px",cursor:"pointer",border:"1px solid rgba(255,255,255,.1)",background:"rgba(255,255,255,.05)",display:"flex",flexDirection:"column",alignItems:"center",gap:"5px"}}>
                    <span style={{fontSize:"30px"}}>{t.flag}</span>
                    <span style={{fontWeight:700,fontSize:"13px",color:"#dce8f0"}}>{t.name}</span>
                    <span style={{fontSize:"10px",color:"#4a7fa5",background:"rgba(59,158,255,.1)",padding:"2px 8px",borderRadius:"8px"}}>{code} calls</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Step 2: Heads or Tails */}
          {tossStep==="pick_side"&&tossCallerSlot&&(()=>{
            const caller=ALL_TEAMS[tossCallerSlot==="A"?teamA:teamB],callerCode=tossCallerSlot==="A"?teamA:teamB;
            return(
              <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"18px",padding:"20px"}} className="si">
                <div style={{textAlign:"center",marginBottom:"18px"}}>
                  <div style={{fontSize:"26px",marginBottom:"3px"}}>{caller.flag}</div>
                  <div style={{fontWeight:800,fontSize:"15px",color:"#e0eaf3",marginBottom:"2px"}}>{caller.name} calls…</div>
                  <div style={{fontSize:"11px",color:"#4a7fa5"}}>Pick before the coin is tossed</div>
                </div>
                <div style={{display:"flex",justifyContent:"center",marginBottom:"20px"}}>
                  <div style={{perspective:"600px"}}>
                    <div className="coin-float" style={{width:"80px",height:"80px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"32px",background:"radial-gradient(circle at 35% 35%,#ffd700,#b8860b)",border:"3px solid #daa520",boxShadow:"0 4px 20px rgba(255,215,0,.3)"}}>🪙</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
                  {[{side:"H",label:"HEADS",emoji:"👑",color:"#ffd700",bg:"rgba(255,215,0,.12)",border:"rgba(255,215,0,.35)"},{side:"T",label:"TAILS",emoji:"🦅",color:"#a0c8ff",bg:"rgba(100,180,255,.1)",border:"rgba(100,180,255,.3)"}].map(({side,label,emoji,color,bg,border})=>(
                    <button key={side} onClick={()=>throwCoin(side)} className="btn"
                      style={{padding:"18px 10px",borderRadius:"14px",cursor:"pointer",background:bg,border:`2px solid ${border}`,display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>
                      <span style={{fontSize:"28px"}}>{emoji}</span>
                      <span style={{fontWeight:800,fontSize:"15px",color,letterSpacing:"0.08em"}}>{label}</span>
                    </button>
                  ))}
                </div>
                <button onClick={()=>{setTossStep("pick_caller");setTossCallerSlot(null);}} style={{width:"100%",padding:"9px",borderRadius:"10px",fontSize:"12px",cursor:"pointer",background:"rgba(255,255,255,.04)",color:"#4a7fa5",border:"1px solid rgba(255,255,255,.08)"}}>← Change caller</button>
              </div>
            );
          })()}

          {/* Step 3: Flipping */}
          {tossStep==="flipping"&&(
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"18px",padding:"32px 20px",textAlign:"center"}} className="si">
              <div style={{fontWeight:700,fontSize:"15px",color:"#e0eaf3",marginBottom:"4px"}}>Tossing the coin…</div>
              <div style={{fontSize:"12px",color:"#4a7fa5",marginBottom:"24px"}}>{ALL_TEAMS[tossCallerSlot==="A"?teamA:teamB].name} called <strong style={{color:"#ffd700"}}>{tossSide==="H"?"HEADS":"TAILS"}</strong></div>
              <div style={{display:"flex",justifyContent:"center",marginBottom:"20px"}}>
                <div style={{perspective:"600px"}}>
                  <div className="coin-flip" style={{width:"100px",height:"100px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"44px",background:"radial-gradient(circle at 35% 35%,#ffd700,#b8860b)",border:"4px solid #daa520",boxShadow:"0 0 40px rgba(255,215,0,.4),0 8px 30px rgba(0,0,0,.6)"}}>🪙</div>
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"center",gap:"6px"}}>{[0,1,2].map(i=><div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",background:"#4a7fa5",animation:`floatUp .8s ease-in-out ${i*.25}s infinite`}}/>)}</div>
            </div>
          )}

          {/* Step 4: Result + choice */}
          {tossStep==="result"&&tossWon&&winnerTeam&&(
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              <div style={{background:"rgba(255,215,0,.07)",border:"1px solid rgba(255,215,0,.25)",borderRadius:"18px",padding:"20px",textAlign:"center"}} className="res-pop">
                <div style={{display:"flex",justifyContent:"center",marginBottom:"12px"}}>
                  <div style={{width:"70px",height:"70px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"28px",background:tossResult==="H"?"radial-gradient(circle at 35% 35%,#ffd700,#b8860b)":"radial-gradient(circle at 35% 35%,#aac8e4,#4a7fa5)",border:`3px solid ${tossResult==="H"?"#daa520":"#6ab0d8"}`,boxShadow:`0 0 20px ${tossResult==="H"?"rgba(255,215,0,.5)":"rgba(100,180,255,.4)"}`}}>{tossResult==="H"?"👑":"🦅"}</div>
                </div>
                <div style={{fontWeight:900,fontSize:"20px",marginBottom:"3px"}} className="gold-text">{tossResult==="H"?"HEADS!":"TAILS!"}</div>
                <div style={{fontSize:"11px",color:"#4a7fa5",marginBottom:"12px"}}>{ALL_TEAMS[tossCallerSlot==="A"?teamA:teamB].name} called <strong style={{color:"#ffd700"}}>{tossSide==="H"?"HEADS":"TAILS"}</strong> — landed <strong style={{color:tossResult==="H"?"#ffd700":"#a0c8ff"}}>{tossResult==="H"?"HEADS":"TAILS"}</strong></div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",padding:"10px 14px",borderRadius:"12px",background:tossSide===tossResult?"rgba(64,200,120,.12)":"rgba(255,100,100,.1)",border:`1px solid ${tossSide===tossResult?"rgba(64,200,120,.3)":"rgba(255,100,100,.25)"}`}}>
                  <span style={{fontSize:"24px"}}>{winnerTeam.flag}</span>
                  <div><div style={{fontWeight:800,fontSize:"14px",color:tossSide===tossResult?"#40c878":"#ff7777"}}>{winnerTeam.name} wins the toss!</div><div style={{fontSize:"10px",color:"#4a7fa5"}}>{tossSide===tossResult?"Called it correctly ✓":"Opponent mis-called"}</div></div>
                  <span style={{fontSize:"18px"}}>{tossSide===tossResult?"🎉":"🔄"}</span>
                </div>
              </div>
              <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"16px",padding:"18px"}} className="si">
                <div style={{textAlign:"center",marginBottom:"14px",fontWeight:700,fontSize:"13px",color:"#e0eaf3"}}>{winnerTeam.flag} {winnerTeam.name} elects to…</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                  {[{c:"bat",icon:"🏏",label:"BAT FIRST",color:"#40c878",bg:"rgba(64,200,120,.15)",border:"rgba(64,200,120,.4)"},{c:"bowl",icon:"⚾",label:"BOWL FIRST",color:"#ff9a3c",bg:"rgba(255,154,60,.15)",border:"rgba(255,154,60,.4)"}].map(({c,icon,label,color,bg,border})=>(
                    <button key={c} onClick={()=>setTossChoice(c)} className="btn"
                      style={{padding:"14px 10px",borderRadius:"14px",cursor:"pointer",background:tossChoice===c?bg:"rgba(255,255,255,.04)",border:`2px solid ${tossChoice===c?border:"rgba(255,255,255,.08)"}`,display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",transition:"all .2s"}}>
                      <span style={{fontSize:"24px"}}>{icon}</span>
                      <span style={{fontWeight:800,fontSize:"13px",color:tossChoice===c?color:"#dce8f0",letterSpacing:"0.05em"}}>{label}</span>
                    </button>
                  ))}
                </div>
              </div>
              {canStart&&batCode&&(
                <div style={{background:"rgba(64,200,120,.08)",border:"1px solid rgba(64,200,120,.2)",borderRadius:"10px",padding:"9px 14px",fontSize:"12px",color:"#40c878",textAlign:"center"}} className="pd">
                  {ALL_TEAMS[batCode].flag} <strong>{ALL_TEAMS[batCode].name}</strong> will bat first
                </div>
              )}
              <button onClick={()=>canStart&&batCode&&initMatch(batCode)} disabled={!canStart}
                style={{width:"100%",padding:"15px",borderRadius:"14px",color:"#fff",fontWeight:700,fontSize:"14px",cursor:canStart?"pointer":"not-allowed",background:canStart?"linear-gradient(135deg,#1a73e8,#0d47a1)":"rgba(255,255,255,.06)",border:"none",boxShadow:canStart?"0 4px 20px rgba(27,115,232,.4)":"none",opacity:canStart?1:.5,transition:"all .2s"}}>
                {canStart?"START MATCH 🏏":"Select bat or bowl to continue"}
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ══════════════════════════════════════════════════════════════════════════
  //  SCREEN 3 — PLAYING
  // ══════════════════════════════════════════════════════════════════════════
  if(!batTeamCode||!bowlTeamCode)return null;
  const batPlayers  = batStats[batTeamCode]?.[innIdx]||[];
  const bowlPlayers = bowlStats[bowlTeamCode]?.[innIdx]||[];
  const curBowler   = bowlerIdx!==null?bowlPlayers[bowlerIdx]:null;
  const tBat=ALL_TEAMS[batTeamCode],tBowl=ALL_TEAMS[bowlTeamCode];
  const crrV=crr(),rrrV=rrr(),remBalls=ballsRemaining(),remRuns=runsNeeded();
  const inningLabel=superOverNum>0?`⚡ Super Over ${superOverNum}`:(format==="Test"?`Inn ${innIdx+1}/4`:(innIdx===0?"1st Inn":"2nd Inn"));

  return(
    <div style={{...base,paddingBottom:"40px"}}>
      <style>{G}</style>

      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:40,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(6,12,23,.97)",borderBottom:"1px solid rgba(255,255,255,.07)",backdropFilter:"blur(12px)"}}>
        <button onClick={()=>setShowHomeConfirm(true)} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:"8px",padding:"4px 10px",color:"#7ab3d4",fontSize:"11px",cursor:"pointer"}}>← Home</button>
        <span style={{fontWeight:900,fontSize:"13px",color:"#e8f4f8"}}>LIVE<span style={{color:"#3b9eff"}}>SCORE</span></span>
        <div style={{display:"flex",gap:"5px",alignItems:"center"}}>
          <span style={{fontSize:"10px",padding:"3px 7px",borderRadius:"20px",fontWeight:600,background:"rgba(59,158,255,.15)",color:"#3b9eff"}}>{format}</span>
          {!matchResult&&<div style={{display:"flex",alignItems:"center",gap:"4px",padding:"3px 7px",borderRadius:"20px",fontSize:"10px",fontWeight:700,background:"rgba(255,50,50,.15)",color:"#ff4444",border:"1px solid rgba(255,50,50,.25)"}}>
            <div style={{width:"5px",height:"5px",borderRadius:"50%",background:"#ff4444",animation:"pulse 1s infinite"}}/>LIVE
          </div>}
        </div>
      </div>

      {/* Match Result Banner (shown in-page) */}
      {matchResult&&(
        <div style={{margin:"10px 14px",padding:"14px",borderRadius:"16px",textAlign:"center",background:"linear-gradient(135deg,rgba(59,158,255,.2),rgba(100,200,120,.1))",border:"1px solid rgba(59,158,255,.4)"}} className="si">
          <div style={{fontSize:"28px",marginBottom:"4px"}}>🏆</div>
          <div style={{fontWeight:900,fontSize:"17px",color:"#e8f4f8",marginBottom:"2px"}}>{matchResult}</div>
          <div style={{fontSize:"11px",color:"#4a7fa5",marginBottom:"12px"}}>{ALL_TEAMS[teamA].flag} {teamA} vs {ALL_TEAMS[teamB].flag} {teamB} · {format}</div>
          <button onClick={()=>setShowEndModal(true)} style={{padding:"10px 24px",borderRadius:"12px",fontWeight:700,fontSize:"13px",cursor:"pointer",background:"linear-gradient(135deg,#1a73e8,#0d47a1)",color:"#fff",border:"none",boxShadow:"0 3px 12px rgba(27,115,232,.4)"}}>View Summary & Return</button>
        </div>
      )}

      {/* Test innings tabs */}
      {format==="Test"&&(
        <div style={{margin:"8px 14px",display:"flex",gap:"4px"}}>
          {Array.from({length:4}).map((_,i)=>{
            const bc=batOrder[i],filled=i<innIdx||(i===innIdx&&sc.balls>0)||scores[i].runs>0;
            return(
              <div key={i} style={{flex:1,padding:"5px 4px",borderRadius:"8px",textAlign:"center",fontSize:"10px",background:i===innIdx?"rgba(59,158,255,.2)":filled?"rgba(255,255,255,.06)":"rgba(255,255,255,.03)",border:`1px solid ${i===innIdx?"rgba(59,158,255,.4)":"rgba(255,255,255,.07)"}`,color:i===innIdx?"#3b9eff":filled?"#8ab4cc":"#2a4a6a"}}>
                <div style={{fontWeight:700}}>Inn {i+1}</div>
                {bc&&<div style={{fontSize:"9px"}}>{bc} {scores[i].runs}/{scores[i].wickets}</div>}
              </div>
            );
          })}
        </div>
      )}

      {/* Test Day/Session strip */}
      {format==="Test" && (
        <div style={{margin:"6px 14px 0",display:"flex",gap:"6px",flexWrap:"wrap"}}>
          <div style={{padding:"4px 10px",borderRadius:"20px",fontSize:"10px",fontWeight:700,background:"rgba(255,140,0,.12)",border:"1px solid rgba(255,140,0,.25)",color:"#ff9a3c"}}>
            📅 Day {testDay}/5
          </div>
          <div style={{padding:"4px 10px",borderRadius:"20px",fontSize:"10px",fontWeight:600,background:"rgba(59,158,255,.1)",border:"1px solid rgba(59,158,255,.2)",color:"#7ab3d4"}}>
            {dayOvers<30?"🌅 Morning":dayOvers<60?"☀️ Afternoon":"🌇 Evening"} · Over {dayOvers}/
            {dayOvers<30?30:dayOvers<60?60:90}
          </div>
          <div style={{padding:"4px 10px",borderRadius:"20px",fontSize:"10px",fontWeight:600,background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",color:"#4a7fa5"}}>
            Next: {dayOvers<30?`Lunch (${30-dayOvers} ov)`:dayOvers<60?`Tea (${60-dayOvers} ov)`:`Stumps (${90-dayOvers} ov)`}
          </div>
        </div>
      )}

      {/* Super Over Banner */}
      {superOverNum>0&&!matchResult&&(
        <div style={{margin:"6px 14px 0",padding:"10px 14px",borderRadius:"14px",background:"linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,140,0,.1))",border:"1px solid rgba(255,215,0,.35)",display:"flex",alignItems:"center",justifyContent:"space-between"}} className="pd">
          <div>
            <div style={{fontWeight:900,fontSize:"14px",color:"#ffd700"}}>⚡ SUPER OVER {superOverNum}</div>
            <div style={{fontSize:"10px",color:"#cc9900",marginTop:"1px"}}>{superOverPhase===0?"1st bat — 1 over each":"2nd bat — chasing!"}</div>
          </div>
          {superOverScores.length>0&&(
            <div style={{textAlign:"right"}}>
              {superOverScores.map((s,i)=>(
                <div key={i} style={{fontSize:"10px",fontFamily:"monospace",color:"#a88000"}}>{ALL_TEAMS[s.team]?.flag} {s.runs}/{s.wickets}</div>
              ))}
            </div>
          )}
          {target&&superOverPhase===1&&(
            <div style={{textAlign:"right",fontFamily:"monospace"}}>
              <div style={{fontSize:"11px",color:"#ffd700",fontWeight:700}}>Need {runsNeeded()}</div>
              <div style={{fontSize:"10px",color:"#a88000"}}>{ballsRemaining()} balls</div>
            </div>
          )}
        </div>
      )}

      {/* Scoreboard */}
      <div style={{margin:"8px 14px",borderRadius:"18px",padding:"14px",background:"linear-gradient(135deg,rgba(27,115,232,.12),rgba(10,22,40,.85))",border:"1px solid rgba(59,158,255,.22)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
            <span style={{fontSize:"20px"}}>{tBat.flag}</span>
            <div><div style={{fontSize:"10px",color:"#4a7fa5"}}>Batting</div><div style={{fontWeight:700,fontSize:"12px"}}>{batTeamCode}</div></div>
          </div>
          <div style={{textAlign:"center"}} className={flashScore?"flash":""}>
            <div style={{fontSize:"38px",fontWeight:900,fontFamily:"'Space Mono',monospace",lineHeight:1}}>{sc.runs}<span style={{color:"#4a7fa5"}}>/{sc.wickets}</span></div>
            <div style={{fontSize:"10px",fontFamily:"'Space Mono',monospace",color:"#4a7fa5"}}>{sc.overs}.{sc.balls} Ov · {inningLabel}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"10px",color:"#4a7fa5"}}>Bowling</div>
            <div style={{fontWeight:700,fontSize:"12px"}}>{bowlTeamCode}</div>
            <span style={{fontSize:"20px"}}>{tBowl.flag}</span>
          </div>
        </div>

        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"10px"}}>
          <div style={{borderRadius:"10px",padding:"7px",textAlign:"center",background:"rgba(255,255,255,.05)"}}>
            <div style={{fontSize:"10px",color:"#4a7fa5"}}>CRR</div>
            <div style={{fontWeight:700,fontSize:"13px",fontFamily:"'Space Mono',monospace"}}>{crrV}</div>
          </div>
          {rrrV?(
            <div style={{borderRadius:"10px",padding:"7px",textAlign:"center",background:"rgba(255,140,0,.1)",border:"1px solid rgba(255,140,0,.2)"}}>
              <div style={{fontSize:"10px",color:"#ff8c00"}}>RRR</div>
              <div style={{fontWeight:700,fontSize:"13px",fontFamily:"'Space Mono',monospace",color:"#ff8c00"}}>{rrrV}</div>
            </div>
          ):(
            <div style={{borderRadius:"10px",padding:"7px",textAlign:"center",background:"rgba(255,255,255,.05)"}}>
              <div style={{fontSize:"10px",color:"#4a7fa5"}}>Inn</div>
              <div style={{fontWeight:700,fontSize:"13px"}}>{inningLabel}</div>
            </div>
          )}
          {/* 3rd box: Need / Balls left / regular balls */}
          {target&&innIdx>=(format==="Test"?3:1)&&remRuns!==null?(
            <div style={{borderRadius:"10px",padding:"7px",textAlign:"center",background:"rgba(64,200,120,.1)",border:"1px solid rgba(64,200,120,.2)"}}>
              <div style={{fontSize:"10px",color:"#40c878"}}>Need</div>
              <div style={{fontWeight:700,fontSize:"13px",fontFamily:"'Space Mono',monospace",color:"#40c878"}}>{remRuns}</div>
            </div>
          ):(
            <div style={{borderRadius:"10px",padding:"7px",textAlign:"center",background:"rgba(255,255,255,.05)"}}>
              <div style={{fontSize:"10px",color:"#4a7fa5"}}>Balls</div>
              <div style={{fontWeight:700,fontSize:"13px",fontFamily:"'Space Mono',monospace"}}>{sc.overs*6+sc.balls}</div>
            </div>
          )}
        </div>

        {/* ★ Runs + Balls remaining box (chasing) */}
        {target&&remRuns!==null&&!matchResult&&(superOverNum>0||innIdx===1||(format==="Test"&&innIdx===3))&&(
          format==="Test"&&innIdx===3?(
            /* Test 4th innings: dual perspective */
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"10px"}} className="pd">
              <div style={{borderRadius:"10px",padding:"8px",textAlign:"center",background:"rgba(255,154,60,.1)",border:"1px solid rgba(255,154,60,.25)"}}>
                <div style={{fontSize:"9px",color:"#ff9a3c",fontWeight:600}}>{ALL_TEAMS[batTeamCode].flag} NEED TO WIN</div>
                <div style={{fontWeight:900,fontSize:"20px",fontFamily:"'Space Mono',monospace",color:"#ff9a3c",lineHeight:1}}>{remRuns} runs</div>
              </div>
              <div style={{borderRadius:"10px",padding:"8px",textAlign:"center",background:"rgba(255,68,68,.1)",border:"1px solid rgba(255,68,68,.25)"}}>
                <div style={{fontSize:"9px",color:"#ff6666",fontWeight:600}}>{ALL_TEAMS[bowlTeamCode].flag} NEED TO WIN</div>
                <div style={{fontWeight:900,fontSize:"20px",fontFamily:"'Space Mono',monospace",color:"#ff6666",lineHeight:1}}>{10-sc.wickets} wkts</div>
              </div>
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"10px"}} className="pd">
              <div style={{borderRadius:"10px",padding:"8px",textAlign:"center",background:"rgba(255,154,60,.1)",border:"1px solid rgba(255,154,60,.25)"}}>
                <div style={{fontSize:"10px",color:"#ff9a3c"}}>Runs to Win</div>
                <div style={{fontWeight:900,fontSize:"22px",fontFamily:"'Space Mono',monospace",color:"#ff9a3c",lineHeight:1}}>{remRuns}</div>
              </div>
              <div style={{borderRadius:"10px",padding:"8px",textAlign:"center",background:"rgba(162,100,255,.1)",border:"1px solid rgba(162,100,255,.25)"}}>
                <div style={{fontSize:"10px",color:"#c084fc"}}>Balls Left</div>
                <div style={{fontWeight:900,fontSize:"22px",fontFamily:"'Space Mono',monospace",color:"#c084fc",lineHeight:1}}>{remBalls??"-"}</div>
              </div>
            </div>
          )
        )}

        {/* Current over */}
        <div>
          <div style={{fontSize:"10px",marginBottom:"5px",color:"#4a7fa5"}}>This Over{curBowler?<span style={{color:"#6ab0d8"}}> · {curBowler.name}</span>:null}</div>
          <div style={{display:"flex",gap:"5px",flexWrap:"wrap",minHeight:"30px"}}>
            {curOver.length===0?<span style={{fontSize:"11px",fontStyle:"italic",color:"#2a4a6a",alignSelf:"center"}}>Over not started</span>:curOver.map((b,i)=><BallChip key={i} outcome={b}/>)}
          </div>
        </div>
      </div>

      {/* On-field players */}
      {!matchResult&&(
        <div style={{margin:"0 14px",display:"flex",flexDirection:"column",gap:"7px"}}>
          {[0,1].map(slot=>{
            const pIdx=onField[slot],p=batPlayers[pIdx];
            if(!p)return null;
            const isStr=slot===strikerSlot,sr=p.balls>0?((p.runs/p.balls)*100).toFixed(0):"0";
            return(
              <div key={slot} style={{borderRadius:"12px",padding:"9px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",background:isStr?"rgba(59,158,255,.1)":"rgba(255,255,255,.03)",border:`1px solid ${isStr?"rgba(59,158,255,.35)":"rgba(255,255,255,.06)"}`}}>
                <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
                  {isStr&&<div style={{width:"3px",height:"32px",borderRadius:"2px",background:"#3b9eff",flexShrink:0}}/>}
                  <div>
                    <div style={{fontSize:"13px",fontWeight:600,display:"flex",alignItems:"center",gap:"5px"}}>{p.name}{isStr&&<span style={{fontSize:"10px",color:"#3b9eff",background:"rgba(59,158,255,.15)",padding:"1px 5px",borderRadius:"6px"}}>★ striker</span>}</div>
                    <div style={{fontSize:"10px",color:"#4a7fa5"}}>SR:{sr} · 4s:{p.fours} 6s:{p.sixes}</div>
                  </div>
                </div>
                <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace"}}>
                  <span style={{fontWeight:900,fontSize:"20px"}}>{p.runs}</span>
                  <span style={{fontSize:"10px",color:"#4a7fa5",marginLeft:"2px"}}>({p.balls})</span>
                </div>
              </div>
            );
          })}
          {curBowler?(
            <div style={{borderRadius:"12px",padding:"9px 12px",background:"rgba(255,68,68,.06)",border:"1px solid rgba(255,68,68,.18)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px"}}>
                <div><div style={{fontSize:"10px",color:"#ff6666"}}>Bowling · {bowlTeamCode}</div><div style={{fontSize:"13px",fontWeight:600}}>{curBowler.name}</div><div style={{fontSize:"10px",color:"#4a7fa5"}}>{curBowler.overs}.{curBowler.balls%6} ov{format!=="Test"?` · ${maxBowlOv(format)-curBowler.overs} left`:""}</div></div>
                <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:"12px"}}>
                  <span style={{color:"#ff6666"}}>{curBowler.wickets}W</span><span style={{color:"#fff",margin:"0 3px"}}>/</span><span>{curBowler.runs}</span>
                  <div style={{fontSize:"10px",color:"#4a7fa5"}}>Eco:{curBowler.overs>0||(curBowler.balls%6)>0?(curBowler.runs/Math.max((curBowler.overs*6+(curBowler.balls%6))/6,.01)).toFixed(1):"-"}</div>
                </div>
              </div>
              {format!=="Test"&&(<div style={{display:"flex",gap:"2px"}}>{Array.from({length:Math.min(maxBowlOv(format),10)}).map((_,j)=><div key={j} style={{flex:1,height:"3px",borderRadius:"2px",background:j<curBowler.overs?"#3b9eff":j===curBowler.overs&&(curBowler.balls%6)>0?"rgba(59,158,255,.35)":"rgba(255,255,255,.1)"}}/>)}{maxBowlOv(format)>10&&<span style={{fontSize:"9px",color:"#4a7fa5",marginLeft:"3px"}}>{curBowler.overs}/{maxBowlOv(format)}</span>}</div>)}
            </div>
          ):(
            <div style={{borderRadius:"12px",padding:"10px",textAlign:"center",background:"rgba(255,68,68,.06)",border:"1px solid rgba(255,68,68,.2)"}}>
              <div style={{fontSize:"12px",fontWeight:600,color:"#ff6666"}}>No bowler selected</div>
              <button onClick={()=>setShowBowlerModal(true)} style={{marginTop:"5px",padding:"5px 14px",borderRadius:"8px",fontSize:"11px",fontWeight:700,background:"rgba(255,68,68,.2)",color:"#ff8888",border:"1px solid rgba(255,68,68,.3)",cursor:"pointer"}}>Select Bowler</button>
            </div>
          )}
        </div>
      )}

      {/* Ball Buttons */}
      {!matchResult&&(
        <div style={{margin:"10px 14px 0"}}>
          {bowlerIdx===null&&<div style={{textAlign:"center",padding:"7px",borderRadius:"8px",fontSize:"11px",background:"rgba(255,68,68,.1)",color:"#ff7777",border:"1px solid rgba(255,68,68,.2)",marginBottom:"7px"}}>⚠️ Select a bowler before scoring</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"6px",marginBottom:"6px"}}>
            {[0,1,2,3].map(r=>(
              <button key={r} onClick={()=>processBall(r)} disabled={bowlerIdx===null} className="btn"
                style={{padding:"11px 0",borderRadius:"10px",fontWeight:700,fontSize:"15px",cursor:bowlerIdx===null?"not-allowed":"pointer",background:r===0?"rgba(255,255,255,.06)":"rgba(59,158,255,.1)",color:r===0?"#555":"#7eb3e8",border:`1px solid ${r===0?"rgba(255,255,255,.08)":"rgba(59,158,255,.2)"}`,opacity:bowlerIdx===null?.4:1}}>
                {r===0?"·":r}
              </button>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"6px",marginBottom:"6px"}}>
            {[{o:4,bg:"rgba(64,200,120,.15)",c:"#40c878",b:"rgba(64,200,120,.3)",l:"4"},{o:6,bg:"rgba(255,154,60,.15)",c:"#ff9a3c",b:"rgba(255,154,60,.3)",l:"6"},{o:"W",bg:"rgba(255,68,68,.15)",c:"#ff4444",b:"rgba(255,68,68,.3)",l:"W"},{o:"Nb",bg:"rgba(255,140,0,.12)",c:"#ff8c00",b:"rgba(255,140,0,.25)",l:"NB"}].map(({o,bg,c,b,l})=>(
              <button key={o} onClick={()=>processBall(o)} disabled={bowlerIdx===null} className="btn"
                style={{padding:"11px 0",borderRadius:"10px",fontWeight:700,fontSize:"14px",cursor:bowlerIdx===null?"not-allowed":"pointer",background:bg,color:c,border:`1px solid ${b}`,opacity:bowlerIdx===null?.4:1}}>{l}</button>
            ))}
          </div>
          {/* Wides */}
          <div style={{marginTop:"6px"}}>
            <div style={{fontSize:"10px",fontWeight:600,color:"#c8c800",marginBottom:"4px",letterSpacing:"0.06em"}}>WIDES</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"5px"}}>
              {["Wd","Wd1","Wd2","Wd3","Wd4"].map(o=>(
                <button key={o} onClick={()=>processBall(o)} disabled={bowlerIdx===null} className="btn"
                  style={{padding:"8px 0",borderRadius:"9px",fontWeight:700,fontSize:"11px",cursor:bowlerIdx===null?"not-allowed":"pointer",background:"rgba(232,232,0,.1)",color:"#e8e800",border:"1px solid rgba(232,232,0,.22)",opacity:bowlerIdx===null?.4:1}}>
                  {o}
                </button>
              ))}
            </div>
          </div>
          {/* Leg Byes */}
          <div style={{marginTop:"6px"}}>
            <div style={{fontSize:"10px",fontWeight:600,color:"#7a7a9a",marginBottom:"4px",letterSpacing:"0.06em"}}>LEG BYES</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"5px"}}>
              {[1,2,3,4].map(r=>(
                <button key={r} onClick={()=>processBall(`Lb${r}`)} disabled={bowlerIdx===null} className="btn"
                  style={{padding:"9px 0",borderRadius:"9px",fontWeight:700,fontSize:"13px",cursor:bowlerIdx===null?"not-allowed":"pointer",background:"rgba(122,122,154,.12)",color:"#9a9ac8",border:"1px solid rgba(122,122,154,.25)",opacity:bowlerIdx===null?.4:1}}>
                  Lb{r}
                </button>
              ))}
            </div>
          </div>
          {/* Byes */}
          <div style={{marginTop:"6px"}}>
            <div style={{fontSize:"10px",fontWeight:600,color:"#6aaa6a",marginBottom:"4px",letterSpacing:"0.06em"}}>BYES</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"5px"}}>
              {[1,2,3,4].map(r=>(
                <button key={r} onClick={()=>processBall(`By${r}`)} disabled={bowlerIdx===null} className="btn"
                  style={{padding:"9px 0",borderRadius:"9px",fontWeight:700,fontSize:"13px",cursor:bowlerIdx===null?"not-allowed":"pointer",background:"rgba(106,170,106,.12)",color:"#80c880",border:"1px solid rgba(106,170,106,.25)",opacity:bowlerIdx===null?.4:1}}>
                  By{r}
                </button>
              ))}
            </div>
          </div>
          {/* Declare button — Test match only, not in 4th innings */}
          {(format==="Test" && innIdx<=2 && !matchResult) ? (
            <div style={{marginTop:"8px"}}>
              <button onClick={()=>setShowDeclareModal(true)} className="btn"
                style={{width:"100%",padding:"10px",borderRadius:"10px",fontWeight:700,fontSize:"12px",cursor:"pointer",background:"rgba(255,215,0,.1)",color:"#ffd700",border:"1px solid rgba(255,215,0,.3)",letterSpacing:"0.05em"}}>
                🏳️ DECLARE INNINGS ({sc.runs}/{sc.wickets})
              </button>
            </div>
          ) : null}
        </div>
      )}

      {/* Tabs */}
      <div style={{margin:"10px 14px 0"}}>
        <div style={{display:"flex",gap:"3px",padding:"4px",borderRadius:"12px",marginBottom:"10px",background:"rgba(255,255,255,.04)"}}>
          {["score","bowling","overs","commentary"].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"7px 3px",borderRadius:"9px",fontSize:"11px",fontWeight:600,cursor:"pointer",textTransform:"capitalize",background:tab===t?"rgba(59,158,255,.2)":"transparent",color:tab===t?"#3b9eff":"#4a7fa5",border:"none"}}>{t}</button>
          ))}
        </div>

        {/* Batting scorecard */}
        {tab==="score"&&(
          <div style={{borderRadius:"12px",overflow:"hidden",border:"1px solid rgba(255,255,255,.08)"}}>
            <div style={{padding:"8px 12px",fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",background:"rgba(59,158,255,.12)",color:"#3b9eff"}}>{tBat.flag} {batTeamCode} · Innings {innIdx+1}</div>
            <div style={{display:"grid",gridTemplateColumns:"4fr 4fr 2fr 2fr",padding:"5px 10px",fontSize:"10px",color:"#4a7fa5"}}><span>Batter</span><span style={{fontSize:"9px"}}>Dismissal</span><span style={{textAlign:"right"}}>R(B)</span><span style={{textAlign:"right"}}>SR</span></div>
            {batPlayers.map((p,i)=>{
              const shown=onField.includes(i)||p.out||i<nextBatRef.current;
              if(!shown)return null;
              const sr=p.balls>0?((p.runs/p.balls)*100).toFixed(0):"-",isOF=onField.includes(i)&&!p.out;
              return(<div key={i} style={{display:"grid",gridTemplateColumns:"4fr 4fr 2fr 2fr",padding:"7px 10px",fontSize:"11px",borderTop:"1px solid rgba(255,255,255,.04)",opacity:p.out?.6:1,background:isOF?"rgba(59,158,255,.05)":"transparent"}}>
                <span style={{fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}{i===striker&&!p.out&&" ★"}</span>
                <span style={{fontSize:"9px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:p.out?"#ff5555":"#4a7fa5"}}>{p.out?p.wicketInfo:isOF?"batting":"yet to bat"}</span>
                <span style={{textAlign:"right",fontFamily:"monospace",fontWeight:700}}>{p.runs}({p.balls})</span>
                <span style={{textAlign:"right",color:"#4a7fa5"}}>{sr}</span>
              </div>);
            })}
          </div>
        )}

        {/* Bowling */}
        {tab==="bowling"&&(
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            <div style={{borderRadius:"12px",overflow:"hidden",border:"1px solid rgba(255,255,255,.08)"}}>
              <div style={{padding:"8px 12px",fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",background:"rgba(255,68,68,.1)",color:"#ff6666"}}>{tBowl.flag} {bowlTeamCode} · Bowling</div>
              <div style={{display:"grid",gridTemplateColumns:"4fr 2fr 2fr 2fr 2fr",padding:"5px 10px",fontSize:"10px",color:"#4a7fa5"}}><span>Bowler</span><span style={{textAlign:"center"}}>O</span><span style={{textAlign:"center"}}>R</span><span style={{textAlign:"center"}}>W</span><span style={{textAlign:"center"}}>Eco</span></div>
              {bowlPlayers.map((p,i)=>{
                const isWK=i===ALL_TEAMS[bowlTeamCode].wkIdx,isCurr=i===bowlerIdx,isLast=i===lastBowlerIdx,full=format!=="Test"&&p.overs>=maxBowlOv(format);
                const eco=p.overs>0||(p.balls%6)>0?(p.runs/Math.max((p.overs*6+(p.balls%6))/6,.01)).toFixed(1):"-";
                return(<div key={i} style={{display:"grid",gridTemplateColumns:"4fr 2fr 2fr 2fr 2fr",padding:"7px 10px",fontSize:"11px",borderTop:"1px solid rgba(255,255,255,.04)",opacity:isWK?.35:1,background:isCurr?"rgba(255,68,68,.07)":"transparent"}}>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500,display:"flex",alignItems:"center",gap:"3px"}}>
                    {p.name}{isWK&&<span style={{fontSize:"8px",color:"#555",background:"rgba(255,255,255,.06)",padding:"0 3px",borderRadius:"3px"}}>WK</span>}
                    {isCurr&&<span style={{fontSize:"8px",color:"#ff6666"}}>▶</span>}
                    {isLast&&!isCurr&&<span style={{fontSize:"8px",color:"#ff8c00",background:"rgba(255,140,0,.1)",padding:"0 3px",borderRadius:"3px"}}>last</span>}
                    {full&&!isCurr&&<span style={{fontSize:"8px",color:"#ff4444",background:"rgba(255,68,68,.1)",padding:"0 3px",borderRadius:"3px"}}>full</span>}
                  </span>
                  <span style={{textAlign:"center",fontFamily:"monospace"}}>{p.overs}.{p.balls%6}</span>
                  <span style={{textAlign:"center",fontFamily:"monospace"}}>{p.runs}</span>
                  <span style={{textAlign:"center",fontFamily:"monospace",fontWeight:700,color:p.wickets>0?"#ff6666":"inherit"}}>{p.wickets}</span>
                  <span style={{textAlign:"center",fontFamily:"monospace",fontSize:"10px",color:eco==="-"?"#4a7fa5":parseFloat(eco)<6?"#40c878":parseFloat(eco)<9?"#e8e800":"#ff6666"}}>{eco}</span>
                </div>);
              })}
            </div>
            <div style={{borderRadius:"10px",padding:"9px 12px",fontSize:"11px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",color:"#3a6a8a"}}>
              <strong style={{color:"#4a7fa5"}}>Rules: </strong>
              {format==="T20"&&"Max 4 overs · No consecutive overs · WK can't bowl"}
              {format==="ODI"&&"Max 10 overs · No consecutive overs · WK can't bowl"}
              {format==="Test"&&"No over limit · No consecutive overs · WK can't bowl"}
            </div>
          </div>
        )}

        {/* Overs */}
        {tab==="overs"&&(
          <div>
            <div style={{borderRadius:"12px",padding:"10px",marginBottom:"8px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)"}}>
              <div style={{fontSize:"11px",marginBottom:"5px",color:"#4a7fa5"}}>Runs Per Over</div>
              <RunChart overs={allOvers[innIdx]}/>
            </div>
            <div style={{borderRadius:"12px",overflow:"hidden",border:"1px solid rgba(255,255,255,.08)"}}>
              <div style={{padding:"8px 12px",fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",background:"rgba(255,255,255,.04)",color:"#4a7fa5"}}>Over by Over</div>
              <div style={{maxHeight:"240px",overflowY:"auto",padding:"2px 10px"}}>
                {allOvers[innIdx].length===0?<p style={{fontSize:"11px",padding:"14px 0",textAlign:"center",color:"#2a4a6a"}}>No completed overs yet</p>:[...allOvers[innIdx]].reverse().map((ov,i)=><OverRow key={i} over={ov.balls} num={allOvers[innIdx].length-i} bowlerName={bowlPlayers[ov.bowlerIdx]?.name}/>)}
              </div>
            </div>
          </div>
        )}

        {/* Commentary */}
        {tab==="commentary"&&(
          <div style={{borderRadius:"12px",overflow:"hidden",border:"1px solid rgba(255,255,255,.08)"}}>
            <div style={{padding:"8px 12px",fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",background:"rgba(255,255,255,.04)",color:"#4a7fa5"}}>Live Commentary</div>
            <div style={{maxHeight:"300px",overflowY:"auto"}}>
              {commentary.map((c,i)=>(
                <div key={c.id} className={i===0?"si":""} style={{padding:"9px 12px",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",gap:"9px",background:c.type==="wicket"?"rgba(255,68,68,.05)":c.type==="six"?"rgba(255,154,60,.05)":c.type==="four"?"rgba(64,200,120,.05)":c.type==="single"?"rgba(59,158,255,.04)":c.type==="milestone"?"rgba(59,158,255,.08)":"transparent"}}>
                  <span style={{fontSize:"10px",fontFamily:"monospace",color:"#4a7fa5",flexShrink:0,marginTop:"1px"}}>{c.over}</span>
                  <span style={{fontSize:"11px",lineHeight:1.5,color:c.type==="wicket"?"#ff7777":c.type==="six"?"#ff9a3c":c.type==="four"?"#40c878":c.type==="single"?"#7eb3e8":c.type==="milestone"?"#3b9eff":"#9ab8cc"}}>{c.text}</span>
                </div>
              ))}
              {commentary.length===0&&<p style={{fontSize:"11px",padding:"20px",textAlign:"center",color:"#2a4a6a"}}>Commentary will appear here</p>}
            </div>
          </div>
        )}
      </div>

      {/* Recent balls */}
      <div style={{margin:"8px 14px 0"}}>
        <div style={{fontSize:"10px",marginBottom:"5px",color:"#4a7fa5"}}>Recent deliveries</div>
        <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>{recentBalls.slice(-20).reverse().map((b,i)=><BallChip key={i} outcome={b} small/>)}</div>
      </div>

      {/* Bowler Modal */}
      {showBowlerModal&&!matchResult&&(
        <BowlerModal teamCode={bowlTeamCode} format={format} bowlStats={bowlPlayers} lastBowlerIdx={lastBowlerIdx} onSelect={(idx)=>{setBowlerIdx(idx);setShowBowlerModal(false);}}/>
      )}

      {/* Wicket Modal */}
      {wicketModal&&(
        <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"14px",background:"rgba(0,0,0,.85)",backdropFilter:"blur(4px)"}}>
          <div style={{width:"100%",maxWidth:"360px",borderRadius:"20px",padding:"18px",background:"#0d1b2a",border:"1px solid rgba(255,68,68,.35)"}} className="si">
            <div style={{textAlign:"center",marginBottom:"14px"}}><div style={{fontSize:"30px",marginBottom:"3px"}}>🚨</div><div style={{fontWeight:900,fontSize:"17px",color:"#ff4444"}}>WICKET!</div><div style={{fontSize:"11px",color:"#4a7fa5"}}>Select dismissal type</div></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px",marginBottom:"8px"}}>
              {WICKET_TYPES.map(t=>(
                <button key={t} onClick={()=>processWicket(t)} className="btn"
                  style={{padding:"9px",borderRadius:"10px",fontSize:"12px",fontWeight:600,cursor:"pointer",background:"rgba(255,68,68,.1)",color:"#ff7777",border:"1px solid rgba(255,68,68,.25)"}}>
                  {t}
                </button>
              ))}
            </div>
            <button onClick={()=>setWicketModal(false)} style={{width:"100%",padding:"9px",borderRadius:"10px",fontSize:"12px",cursor:"pointer",background:"rgba(255,255,255,.05)",color:"#666",border:"none"}}>Cancel</button>
          </div>
        </div>
      )}

      {/* ── HOME CONFIRMATION MODAL ── */}
      {showHomeConfirm && (
        <div style={{position:"fixed",inset:0,zIndex:70,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",background:"rgba(0,0,0,.88)",backdropFilter:"blur(6px)"}}>
          <div style={{width:"100%",maxWidth:"320px",borderRadius:"20px",padding:"24px 20px",background:"#0d1b2a",border:"1px solid rgba(255,100,100,.3)"}} className="si">
            <div style={{textAlign:"center",marginBottom:"20px"}}>
              <div style={{fontSize:"36px",marginBottom:"8px"}}>🏠</div>
              <div style={{fontWeight:900,fontSize:"16px",color:"#e8f4f8",marginBottom:"6px"}}>Return to Home?</div>
              <div style={{fontSize:"12px",color:"#4a7fa5",lineHeight:1.5}}>The current match will be abandoned and all progress will be lost.</div>
            </div>
            <div style={{display:"flex",gap:"10px"}}>
              <button onClick={()=>setShowHomeConfirm(false)}
                style={{flex:1,padding:"12px",borderRadius:"12px",fontSize:"13px",fontWeight:600,cursor:"pointer",background:"rgba(255,255,255,.06)",color:"#7ab3d4",border:"1px solid rgba(255,255,255,.12)"}}>
                Cancel
              </button>
              <button onClick={goHome} className="btn"
                style={{flex:1,padding:"12px",borderRadius:"12px",fontSize:"13px",fontWeight:700,cursor:"pointer",background:"linear-gradient(135deg,#c0392b,#96281b)",color:"#fff",border:"none"}}>
                Yes, Go Home
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── SESSION BREAK MODAL ── */}
      {sessionBreak && (
        <div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:"12px",background:"rgba(0,0,0,.93)",backdropFilter:"blur(6px)"}}>
          <div style={{width:"100%",maxWidth:"400px",borderRadius:"22px",overflow:"hidden",background:"#080f1c",border:`1px solid ${sessionBreak.type==="stumps"?"rgba(255,165,0,.4)":sessionBreak.type==="lunch"?"rgba(64,200,120,.4)":"rgba(100,160,255,.4)"}`}} className="si">

            {/* Header */}
            <div style={{padding:"18px 18px 12px",background:sessionBreak.type==="stumps"?"linear-gradient(135deg,rgba(255,140,0,.18),rgba(255,80,0,.08))":sessionBreak.type==="lunch"?"linear-gradient(135deg,rgba(64,200,120,.15),rgba(0,180,80,.06))":"linear-gradient(135deg,rgba(59,130,246,.15),rgba(100,160,255,.06))",textAlign:"center"}}>
              <div style={{fontSize:"40px",marginBottom:"6px"}}>{sessionBreak.type==="stumps"?"🌅":sessionBreak.type==="lunch"?"🍽️":"☕"}</div>
              <div style={{fontWeight:900,fontSize:"20px",color:"#f0f4f8",marginBottom:"3px"}}>
                {sessionBreak.type==="stumps"?`Day ${sessionBreak.day} — Stumps`:sessionBreak.type==="lunch"?"Lunch Break":"Tea Break"}
              </div>
              <div style={{fontSize:"11px",color:"#5a8faa"}}>
                {sessionBreak.session} · {ALL_TEAMS[sessionBreak.batTeam]?.flag} {sessionBreak.batTeam} batting
              </div>
            </div>

            {/* Current Score */}
            <div style={{padding:"12px 16px 8px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:"12px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",marginBottom:"10px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <span style={{fontSize:"22px"}}>{ALL_TEAMS[sessionBreak.batTeam]?.flag}</span>
                  <div>
                    <div style={{fontSize:"11px",color:"#4a7fa5"}}>Score at {sessionBreak.type==="stumps"?"Stumps":"Break"}</div>
                    <div style={{fontWeight:900,fontSize:"22px",fontFamily:"monospace",color:"#e8f4f8"}}>{sessionBreak.score.runs}<span style={{color:"#4a7fa5",fontSize:"16px"}}>/{sessionBreak.score.wickets}</span></div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:"11px",color:"#4a7fa5"}}>{sessionBreak.score.overs} overs</div>
                  {/* Lead/Trail calculation */}
                  {(()=>{
                    const bo=sessionBreak.batOrder, sc=sessionBreak.allScores;
                    // sum opponent runs across their completed innings
                    const oppTeam=sessionBreak.bowlTeam;
                    const oppRuns=bo.slice(0,sessionBreak.innIdx).reduce((sum,t,i)=>t===oppTeam?sum+(sc[i]?.runs||0):sum,0);
                    const batRuns2=bo.slice(0,sessionBreak.innIdx).reduce((sum,t,i)=>t===sessionBreak.batTeam?sum+(sc[i]?.runs||0):sum,0)+sessionBreak.score.runs;
                    const diff=batRuns2-oppRuns;
                    if(sessionBreak.innIdx===0||oppRuns===0)return null;
                    return(
                      <div style={{fontSize:"12px",fontWeight:700,color:diff>=0?"#40c878":"#ff6b6b"}}>
                        {diff>=0?`Lead ${diff}`:`Trail ${Math.abs(diff)}`}
                      </div>
                    );
                  })()}
                </div>
              </div>

              {/* Best bat/bowl performers */}
              {(()=>{
                const bats=sessionBreak.batPlayers.filter(p=>p.balls>0).sort((a,b)=>b.runs-a.runs).slice(0,3);
                const bowls=sessionBreak.bowlPlayers.filter(p=>p.overs>0||p.balls>0).sort((a,b)=>b.wickets-a.wickets||a.runs-b.runs).slice(0,3);
                const wkts=sessionBreak.score.wickets;
                return(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                    {/* Batters or wicket takers depending on situation */}
                    <div style={{borderRadius:"10px",padding:"9px",background:"rgba(59,158,255,.07)",border:"1px solid rgba(59,158,255,.15)"}}>
                      <div style={{fontSize:"10px",fontWeight:700,color:"#3b9eff",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"6px"}}>
                        {wkts>=5?"🏏 Top Scorer":"🏏 Batters"}
                      </div>
                      {bats.length===0?<div style={{fontSize:"10px",color:"#3a6a8a"}}>No data</div>:bats.map((p,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"3px"}}>
                          <span style={{color:"#c8dce8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"90px"}}>{p.name.split(" ").slice(-1)[0]}</span>
                          <span style={{fontFamily:"monospace",color:p.out?"#ff6b6b":"#40c878",fontWeight:700}}>{p.runs}{p.out?"":"*"}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{borderRadius:"10px",padding:"9px",background:"rgba(255,68,68,.07)",border:"1px solid rgba(255,68,68,.15)"}}>
                      <div style={{fontSize:"10px",fontWeight:700,color:"#ff6b6b",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"6px"}}>
                        ⚡ Bowlers
                      </div>
                      {bowls.length===0?<div style={{fontSize:"10px",color:"#5a3a3a"}}>No data</div>:bowls.map((p,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"3px"}}>
                          <span style={{color:"#c8dce8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"80px"}}>{p.name.split(" ").slice(-1)[0]}</span>
                          <span style={{fontFamily:"monospace",color:"#ff9a3c",fontWeight:700}}>{p.wickets}/{p.runs}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}

              {/* Pie chart — only on stumps (end of day) */}
              {sessionBreak.type==="stumps" && sessionSnapshots.length>0 && (()=>{
                // Gather session data for the current day
                const daySnaps=sessionSnapshots.filter(s=>s.day===sessionBreak.day);
                if(daySnaps.length===0)return null;
                // Compute runs per session by diff
                const sessions=["Morning Session","Afternoon Session","Evening Session"];
                const sessionColors=["#3b9eff","#40c878","#ff9a3c"];
                let prevRuns=0;
                const sessionRuns=sessions.map((name,si)=>{
                  const snap=daySnaps.find(s=>s.session===name);
                  if(!snap)return{name,runs:0,color:sessionColors[si]};
                  const r=snap.score.runs-prevRuns;
                  prevRuns=snap.score.runs;
                  return{name,runs:Math.max(0,r),color:sessionColors[si]};
                }).filter(s=>s.runs>0);
                if(sessionRuns.length===0)return null;
                const total=sessionRuns.reduce((a,b)=>a+b.runs,0);
                if(total===0)return null;
                // Simple SVG pie
                let angle=0;
                const R=40,CX=50,CY=50;
                const slices=sessionRuns.map(s=>{
                  const pct=s.runs/total;
                  const start=angle;
                  angle+=pct*2*Math.PI;
                  const x1=CX+R*Math.sin(start),y1=CY-R*Math.cos(start);
                  const x2=CX+R*Math.sin(angle),y2=CY-R*Math.cos(angle);
                  const large=pct>0.5?1:0;
                  return{...s,pct,path:`M${CX},${CY} L${x1},${y1} A${R},${R},0,${large},1,${x2},${y2} Z`};
                });
                return(
                  <div style={{borderRadius:"12px",padding:"12px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",marginBottom:"10px"}}>
                    <div style={{fontSize:"11px",fontWeight:700,color:"#4a7fa5",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"8px"}}>📊 Session Run Distribution</div>
                    <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
                      <svg viewBox="0 0 100 100" style={{width:80,height:80,flexShrink:0}}>
                        {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="#080f1c" strokeWidth="1.5"/>)}
                        <circle cx={CX} cy={CY} r="18" fill="#080f1c"/>
                        <text x={CX} y={CY+4} textAnchor="middle" fill="#e8f4f8" fontSize="9" fontWeight="bold">{total}</text>
                      </svg>
                      <div style={{flex:1}}>
                        {slices.map((s,i)=>(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"5px"}}>
                            <div style={{width:"10px",height:"10px",borderRadius:"2px",background:s.color,flexShrink:0}}/>
                            <span style={{fontSize:"10px",color:"#8ab8d4",flex:1}}>{s.name.replace(" Session","")}</span>
                            <span style={{fontSize:"11px",fontWeight:700,fontFamily:"monospace",color:s.color}}>{s.runs}</span>
                            <span style={{fontSize:"9px",color:"#4a7fa5"}}>({(s.pct*100).toFixed(0)}%)</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* Resume button */}
              <button onClick={resumeSession} className="btn"
                style={{width:"100%",padding:"13px",borderRadius:"13px",fontWeight:700,fontSize:"14px",cursor:"pointer",
                  background:sessionBreak.type==="stumps"?"linear-gradient(135deg,#ff8c00,#e65c00)":sessionBreak.type==="lunch"?"linear-gradient(135deg,#1a7a40,#0d5c2e)":"linear-gradient(135deg,#1a5fa8,#0d3d7a)",
                  color:"#fff",border:"none",boxShadow:"0 4px 18px rgba(0,0,0,.4)"}}>
                {sessionBreak.type==="stumps"?`☀️ Start Day ${sessionBreak.day+1}`:sessionBreak.type==="lunch"?"🍽️ Start Afternoon Session":"☕ Start Evening Session"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── DECLARE CONFIRMATION MODAL ── */}
      {showDeclareModal&&!matchResult&&(
        <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"14px",background:"rgba(0,0,0,.85)",backdropFilter:"blur(4px)"}}>
          <div style={{width:"100%",maxWidth:"360px",borderRadius:"20px",padding:"20px",background:"#0d1b2a",border:"1px solid rgba(255,215,0,.35)"}} className="si">
            <div style={{textAlign:"center",marginBottom:"16px"}}>
              <div style={{fontSize:"32px",marginBottom:"6px"}}>🏳️</div>
              <div style={{fontWeight:900,fontSize:"17px",color:"#ffd700",marginBottom:"4px"}}>Declare Innings?</div>
              <div style={{fontSize:"12px",color:"#8ab8d4",marginBottom:"4px"}}>{ALL_TEAMS[batTeamCode]?.flag} {batTeamCode} — {sc.runs}/{sc.wickets} ({sc.overs}.{sc.balls} ov)</div>
              <div style={{fontSize:"11px",color:"#4a7fa5",background:"rgba(255,215,0,.07)",border:"1px solid rgba(255,215,0,.15)",borderRadius:"8px",padding:"8px",marginTop:"8px"}}>
                The batting captain voluntarily closes the innings. The opposition will bat next.
                {innIdx===0 && scores[1].runs===0 && <><br/><br/>⚠️ Declaring in 1st innings means the opponent bats, then you bat 3rd.</>}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <button onClick={()=>setShowDeclareModal(false)} style={{padding:"11px",borderRadius:"12px",fontSize:"13px",cursor:"pointer",background:"rgba(255,255,255,.05)",color:"#7ab3d4",border:"1px solid rgba(255,255,255,.1)"}}>
                Cancel
              </button>
              <button onClick={declareInnings} className="btn"
                style={{padding:"11px",borderRadius:"12px",fontWeight:700,fontSize:"13px",cursor:"pointer",background:"rgba(255,215,0,.2)",color:"#ffd700",border:"1px solid rgba(255,215,0,.4)"}}>
                ✓ Declare!
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── FOLLOW-ON MODAL ── */}
      {showFollowOnModal&&!matchResult&&(
        <div style={{position:"fixed",inset:0,zIndex:52,display:"flex",alignItems:"center",justifyContent:"center",padding:"14px",background:"rgba(0,0,0,.88)",backdropFilter:"blur(5px)"}}>
          <div style={{width:"100%",maxWidth:"380px",borderRadius:"22px",overflow:"hidden",background:"#0a1525",border:"1px solid rgba(59,158,255,.35)"}} className="si">
            <div style={{padding:"20px 20px 14px",background:"linear-gradient(135deg,rgba(59,158,255,.15),rgba(255,140,0,.08))",textAlign:"center"}}>
              <div style={{fontSize:"38px",marginBottom:"6px"}}>⚡</div>
              <div style={{fontWeight:900,fontSize:"18px",color:"#e8f4f8",marginBottom:"3px"}}>Follow-On!</div>
              <div style={{fontSize:"12px",color:"#4a7fa5"}}>The opposition trails by {scores[0].runs - scores[1].runs} runs (threshold: {FOLLOW_ON_LEAD})</div>
            </div>
            <div style={{padding:"16px"}}>
              <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"12px",padding:"12px",marginBottom:"14px",fontSize:"11px",color:"#8ab8d4",lineHeight:1.6}}>
                <strong style={{color:"#e0eaf3"}}>📋 Cricket Rule:</strong><br/>
                If the team batting second trails by <strong style={{color:"#ffd700"}}>{FOLLOW_ON_LEAD}+ runs</strong> after their 1st innings, the fielding captain may enforce the follow-on — making the opposition bat again immediately without rest.
              </div>
              <div style={{fontSize:"12px",fontWeight:600,color:"#4a7fa5",marginBottom:"10px",textAlign:"center"}}>
                {ALL_TEAMS[batOrder[0]]?.flag} {ALL_TEAMS[batOrder[0]]?.name} — enforce follow-on?
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                <button onClick={enforceFollowOn} className="btn"
                  style={{width:"100%",padding:"13px",borderRadius:"13px",fontWeight:700,fontSize:"13px",cursor:"pointer",background:"linear-gradient(135deg,rgba(255,140,0,.25),rgba(255,68,68,.15))",color:"#ff9a3c",border:"1px solid rgba(255,140,0,.4)"}}>
                  ⚡ Enforce Follow-On<br/>
                  <span style={{fontSize:"10px",fontWeight:400,color:"#cc7a30"}}>{ALL_TEAMS[batOrder[1]]?.name} bats again immediately</span>
                </button>
                <button onClick={()=>{setShowFollowOnModal(false);advanceInnings(scores,innIdx,batTeamCode);}} className="btn"
                  style={{width:"100%",padding:"13px",borderRadius:"13px",fontWeight:700,fontSize:"13px",cursor:"pointer",background:"rgba(59,158,255,.1)",color:"#3b9eff",border:"1px solid rgba(59,158,255,.3)"}}>
                  🏏 Waive Follow-On<br/>
                  <span style={{fontSize:"10px",fontWeight:400,color:"#2a6fa8"}}>{ALL_TEAMS[batOrder[0]]?.name} bats 3rd innings</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── END OF MATCH MODAL ── */}
      {showEndModal&&(
        <div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",background:"rgba(0,0,0,.9)",backdropFilter:"blur(8px)"}}>
          <div style={{width:"100%",maxWidth:"380px",borderRadius:"24px",overflow:"hidden",background:"#0a1525",border:"1px solid rgba(59,158,255,.3)",boxShadow:"0 20px 60px rgba(0,0,0,.8)"}} className="si">
            {/* Trophy header */}
            <div style={{padding:"24px 20px 16px",textAlign:"center",background:"linear-gradient(135deg,rgba(27,115,232,.15),rgba(100,200,120,.08))"}}>
              <div style={{fontSize:"52px",marginBottom:"8px"}}>🏆</div>
              <div style={{fontWeight:900,fontSize:"20px",color:"#e8f4f8",marginBottom:"4px"}}>{matchResult}</div>
              <div style={{fontSize:"12px",color:"#4a7fa5"}}>{ALL_TEAMS[teamA].flag} {ALL_TEAMS[teamA].name} vs {ALL_TEAMS[teamB].flag} {ALL_TEAMS[teamB].name}</div>
              <div style={{fontSize:"11px",color:"#3a6a8a",marginTop:"2px"}}>{format} Match</div>
            </div>
            {/* Scorecards summary */}
            <div style={{padding:"14px 16px"}}>
              <div style={{fontSize:"11px",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",color:"#4a7fa5",marginBottom:"8px"}}>Match Summary</div>
              {Array.from({length:totalInnings}).map((_,i)=>{
                const bc=batOrder[i];if(!bc)return null;
                const s=scores[i],t=ALL_TEAMS[bc];
                return(
                  <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",borderRadius:"10px",marginBottom:"5px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.06)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"7px"}}><span style={{fontSize:"18px"}}>{t.flag}</span><div><div style={{fontSize:"12px",fontWeight:600}}>{bc}</div><div style={{fontSize:"10px",color:"#4a7fa5"}}>Innings {i+1}</div></div></div>
                    <div style={{textAlign:"right",fontFamily:"monospace"}}><span style={{fontWeight:700,fontSize:"16px"}}>{s.runs}</span><span style={{color:"#4a7fa5",fontSize:"12px"}}>/{s.wickets}</span><div style={{fontSize:"10px",color:"#4a7fa5"}}>{s.overs}.{s.balls} ov</div></div>
                  </div>
                );
              })}
            </div>
            {/* Action buttons */}
            <div style={{padding:"0 16px 18px",display:"flex",flexDirection:"column",gap:"8px"}}>
              <button onClick={goHome} className="btn"
                style={{width:"100%",padding:"14px",borderRadius:"14px",fontWeight:700,fontSize:"14px",cursor:"pointer",background:"linear-gradient(135deg,#1a73e8,#0d47a1)",color:"#fff",border:"none",boxShadow:"0 4px 16px rgba(27,115,232,.4)"}}>
                🏠 Return to Home
              </button>
              <button onClick={()=>setShowEndModal(false)} style={{width:"100%",padding:"11px",borderRadius:"12px",fontSize:"13px",cursor:"pointer",background:"rgba(255,255,255,.05)",color:"#7ab3d4",border:"1px solid rgba(255,255,255,.1)"}}>
                View Full Scorecard
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<CricketScorer />);
</script>
</body>
</html>
